<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Waleed Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 pb-24">

    <nav class="p-4 bg-white border-b border-slate-100 flex items-center gap-4">
        <button onclick="history.back()"><i class="fa-solid fa-arrow-left text-xl text-slate-800"></i></button>
        <h1 class="text-xl font-bold text-slate-900">Checkout</h1>
    </nav>

    <div class="p-4 space-y-6">
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
            <h2 class="font-bold text-slate-800 mb-4">Your Items</h2>
            <div id="checkout-items" class="space-y-4"></div>
            
            <div class="mt-4 pt-4 border-t border-slate-100 space-y-2 text-sm">
                <div class="flex justify-between text-slate-500">
                    <span>Subtotal</span>
                    <span id="subtotal">Rs. 0</span>
                </div>
                <div class="flex justify-between text-slate-500">
                    <span>Delivery Charges</span>
                    <span id="delivery-total">Rs. 0</span>
                </div>
                <div class="flex justify-between font-bold text-lg text-blue-600 pt-2">
                    <span>Total</span>
                    <span id="grand-total">Rs. 0</span>
                </div>
            </div>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 space-y-4">
            <h2 class="font-bold text-slate-800">Shipping Information</h2>
            <input type="text" id="custName" placeholder="Full Name" class="w-full p-4 bg-slate-50 rounded-xl outline-none border border-transparent focus:border-blue-500">
            <input type="number" id="custPhone" placeholder="WhatsApp Number" class="w-full p-4 bg-slate-50 rounded-xl outline-none border border-transparent focus:border-blue-500">
            
            <input type="text" id="custCity" placeholder="City" class="w-full p-4 bg-slate-50 rounded-xl outline-none border border-transparent focus:border-blue-500">
            
            <textarea id="custAddress" placeholder="Full Address (House No, Street...)" class="w-full p-4 bg-slate-50 rounded-xl outline-none border border-transparent focus:border-blue-500 h-24"></textarea>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
            <h2 class="font-bold text-slate-800 mb-3">Payment Method</h2>
            <div class="flex items-center p-3 border-2 border-blue-600 rounded-xl bg-blue-50">
                <i class="fa-solid fa-truck text-blue-600 mr-3"></i>
                <span class="font-semibold text-blue-600">Cash on Delivery</span>
                <i class="fa-solid fa-circle-check ml-auto text-blue-600"></i>
            </div>
            <p class="text-[10px] text-slate-400 mt-2">Online Payment (Phase 3) coming soon!</p>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full p-4 bg-white border-t border-slate-100 z-50">
        <button onclick="placeOrder()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition">Confirm Order</button>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        
        function loadCheckout() {
            const container = document.getElementById('checkout-items');
            let subtotal = 0;
            let deliveryTotal = 0;

            container.innerHTML = '';
            cart.forEach(item => {
                // Item price se "Rs. " hatakar number nikalna
                const priceNum = parseInt(item.price.replace(/[^\d]/g, ''));
                // Agar aapne har product ke liye alag delivery charges rakhe hain
                const itemDelivery = item.deliveryCharges ? parseInt(item.deliveryCharges) : 200; // Default 200

                subtotal += priceNum;
                deliveryTotal += itemDelivery;

                container.innerHTML += `
                    <div class="flex items-center gap-4">
                        <img src="${item.img}" class="w-16 h-16 rounded-lg object-cover">
                        <div class="flex-1">
                            <h3 class="font-bold text-sm text-slate-800">${item.name}</h3>
                            <p class="text-blue-600 font-bold text-xs">${item.price}</p>
                        </div>
                    </div>`;
            });

            document.getElementById('subtotal').innerText = 'Rs. ' + subtotal;
            document.getElementById('delivery-total').innerText = 'Rs. ' + deliveryTotal;
            document.getElementById('grand-total').innerText = 'Rs. ' + (subtotal + deliveryTotal);
        }

        function placeOrder() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const city = document.getElementById('custCity').value;
            const address = document.getElementById('custAddress').value;
            const total = document.getElementById('grand-total').innerText;

            if(!name || !phone || !city || !address) {
                alert("Please fill all details!");
                return;
            }

            let orderText = `*New Order - Waleed Store*%0A%0A`;
            orderText += `*Name:* ${name}%0A`;
            orderText += `*Phone:* ${phone}%0A`;
            orderText += `*City:* ${city}%0A`;
            orderText += `*Address:* ${address}%0A%0A`;
            orderText += `*Items:*%0A`;
            
            cart.forEach(i => { orderText += `- ${i.name} (${i.price})%0A`; });
            orderText += `%0A*Total Amount:* ${total}`;

            // localStorage clear karein order ke baad
            localStorage.removeItem('cart');
            window.location.href = `https://wa.me/923704884772?text=${orderText}`;
        }

        loadCheckout();
    </script>
</body>
</html>
