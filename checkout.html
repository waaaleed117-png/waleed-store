<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Waleed Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #f8fafc; color: #0f172a; }
        .glass { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="pt-20 pb-10">

    <nav class="glass fixed w-full top-0 z-50 px-4 py-2 border-b border-slate-100">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-1">
                <span class="text-xl font-extrabold text-slate-900">Waleed</span>
                <span class="text-xl font-extrabold text-blue-600">Store</span>
            </a>
            <button onclick="history.back()" class="text-slate-800 p-2"><i class="fa-solid fa-arrow-left text-xl"></i></button>
        </div>
    </nav>

    <div class="container mx-auto px-4 max-w-xl">
        <h2 class="text-2xl font-800 mb-6 flex items-center gap-2">
            <i class="fa-solid fa-cart-shopping text-blue-600"></i> Your Cart
        </h2>

        <div id="cart-items" class="space-y-4 mb-8">
            </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-8">
            <div class="flex justify-between items-center mb-2">
                <span class="text-slate-500">Subtotal</span>
                <span id="subtotal" class="font-bold">Rs. 0</span>
            </div>
            <div class="flex justify-between items-center mb-4 text-green-600">
                <span class="text-sm">Delivery Charges</span>
                <span class="text-sm font-bold">FREE</span>
            </div>
            <div class="h-[1px] bg-slate-100 mb-4"></div>
            <div class="flex justify-between items-center">
                <span class="font-bold text-lg">Total Bill</span>
                <span id="total-bill" class="font-800 text-xl text-blue-600">Rs. 0</span>
            </div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <h3 class="font-bold mb-4">Delivery Details</h3>
            <div class="space-y-4">
                <input type="text" id="custName" placeholder="Full Name" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none focus:border-blue-500">
                <input type="number" id="custPhone" placeholder="WhatsApp Number" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none focus:border-blue-500">
                <textarea id="custAddress" placeholder="Complete Address" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none h-24 focus:border-blue-500"></textarea>
                
                <button onclick="placeOrder()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-blue-600/20 active:scale-95 transition">
                    Confirm Order via WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBYrmozXYLHxCmLsc8FX6aN6xSvORxXypo",
            authDomain: "waleed-store-f7369.firebaseapp.com",
            databaseURL: "https://waleed-store-f7369-default-rtdb.firebaseio.com/",
            projectId: "waleed-store-f7369",
            storageBucket: "waleed-store-f7369.appspot.com",
            messagingSenderId: "148677610444",
            appId: "1:148677610444:web:2a838575003504f216503c"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function renderCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = "";
            let total = 0;

            if (cart.length === 0) {
                container.innerHTML = "<p class='text-center text-slate-400 py-10'>Your cart is empty.</p>";
                return;
            }

            cart.forEach((item, index) => {
                const price = parseInt(item.price.replace(/[^\d]/g, ''));
                total += price;

                container.innerHTML += `
                    <div class="bg-white p-3 rounded-2xl flex items-center gap-4 shadow-sm border border-slate-50">
                        <img src="${item.img}" class="w-16 h-16 object-cover rounded-xl">
                        <div class="flex-1">
                            <h4 class="font-bold text-sm text-slate-800">${item.name}</h4>
                            <p class="text-blue-600 font-bold text-xs">${item.price}</p>
                        </div>
                        <button onclick="removeItem(${index})" class="text-red-400 p-2"><i class="fa-solid fa-trash-can"></i></button>
                    </div>`;
            });

            document.getElementById('subtotal').innerText = "Rs. " + total;
            document.getElementById('total-bill').innerText = "Rs. " + total;
        }

        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        function placeOrder() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const address = document.getElementById('custAddress').value;
            const total = document.getElementById('total-bill').innerText;

            if (!name || !phone || !address) return alert("Please fill all details!");

            let itemDetails = cart.map((item, i) => `${i+1}. ${item.name} (${item.price})`).join('%0A');
            
            // 1. Save to Firebase for Admin Panel
            database.ref('orders').push({
                customerName: name,
                customerPhone: phone,
                address: address,
                items: cart,
                totalPrice: total,
                date: new Date().toLocaleString()
            }).then(() => {
                // 2. Redirect to WhatsApp
                const waMsg = `*Naya Order - Waleed Store*%0A---------------------------%0A*Items:*%0A${itemDetails}%0A---------------------------%0A*Total Bill:* ${total}%0A---------------------------%0A*Customer Details:*%0AName: ${name}%0APhone: ${phone}%0AAddress: ${address}`;
                
                localStorage.removeItem('cart'); // Clear cart after order
                window.open(`https://wa.me/923704884772?text=${waMsg}`, '_blank');
                location.href = "index.html";
            });
        }

        renderCart();
    </script>
</body>
</html>
