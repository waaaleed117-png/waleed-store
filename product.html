<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Product Details | Waleed Store</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body { font-family: 'Poppins', sans-serif; background: #ffffff; color: #0f172a; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        
        /* Sidebar Styles (Image 2 Style) */
        .sidebar { transition: 0.3s; width: 280px; background: #ffffff; height: 100vh; position: fixed; left: -280px; z-index: 6000; box-shadow: 10px 0 30px rgba(0,0,0,0.1); }
        .sidebar.active { left: 0; }
        .sidebar-header { background: #2563eb; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Cart Drawer Styles (Image 3 Style) */
        .cart-drawer { transition: 0.3s; width: 320px; background: #ffffff; height: 100vh; position: fixed; right: -320px; top: 0; z-index: 6000; box-shadow: -10px 0 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .cart-drawer.active { right: 0; }

        /* Logo Fix */
        .brand-icon { width: 45px; height: 45px; object-fit: contain; display: block; } 

        /* Slider & Rest */
        .slider-wrapper { width: 100%; position: relative; border-radius: 2rem; overflow: hidden; background: #f8fafc; border: 1px solid #f1f5f9; }
        .slider-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; width: 100%; aspect-ratio: 1/1; }
        .slider-container::-webkit-scrollbar { display: none; }
        .slide { flex: 0 0 100%; width: 100%; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; }
        .slide img { max-height: 100%; max-width: 100%; object-fit: contain; }
        .thumb-img { width: 60px; height: 60px; object-fit: cover; border-radius: 12px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; background: #f1f5f9; flex-shrink: 0; }
        .thumb-img.active { border-color: #2563eb; transform: scale(1.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 5500; backdrop-filter: blur(3px); }
        .overlay.active { display: block; }
    </style>
</head>
<body class="pt-20">

    <div id="overlay" class="overlay" onclick="closeAll()"></div>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <span class="text-xl font-bold">Menu</span>
            <button onclick="toggleSidebar()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <nav class="p-4 space-y-2">
            <a href="index.html" class="flex items-center gap-4 p-4 hover:bg-slate-50 rounded-xl text-slate-700 font-semibold transition">
                <i class="fa-solid fa-house text-blue-600"></i> Home
            </a>
            <a href="index.html#contact-section" class="flex items-center gap-4 p-4 hover:bg-slate-50 rounded-xl text-slate-700 font-semibold transition">
                <i class="fa-solid fa-envelope text-blue-600"></i> Contact Us
            </a>
        </nav>
    </div>

    <div id="cartDrawer" class="cart-drawer">
        <div class="p-6 border-b flex justify-between items-center">
            <h2 class="text-xl font-extrabold text-slate-900">Your Cart</h2>
            <button onclick="toggleCart()" class="text-slate-400 text-2xl"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="cartItemsList" class="flex-1 overflow-y-auto p-4 space-y-4">
            </div>
        <div class="p-6 border-t bg-slate-50">
            <div class="flex justify-between items-center mb-6">
                <span class="text-slate-500 font-bold uppercase tracking-tight">Total:</span>
                <span id="cartTotal" class="text-xl font-extrabold text-blue-600">Rs. 0</span>
            </div>
            <button onclick="window.location.href='checkout.html'" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold uppercase tracking-widest hover:bg-black transition">Check Out</button>
        </div>
    </div>

    <nav class="glass fixed w-full top-0 z-[5000] px-4 py-2 border-b border-slate-100">
        <div class="container mx-auto grid grid-cols-3 items-center">
            <div class="flex justify-start">
                <button onclick="toggleSidebar()" class="p-2 text-blue-600">
                    <i class="fa-solid fa-bars-staggered text-2xl"></i>
                </button>
            </div>
            
            <div class="flex justify-center">
                <a href="index.html" class="flex flex-col items-center">
                    <img src="https://i.ibb.co/MkzmytwF/e13258a2b49aef72b89a49f114500d18.jpg" alt="Logo" class="brand-icon">
                    <span class="text-[10px] font-black uppercase text-slate-900 tracking-tighter">Waleed <span class="text-blue-600">Store</span></span>
                </a>
            </div>
            
            <div class="flex justify-end items-center gap-3">
                <div class="relative p-1 cursor-pointer" onclick="toggleCart()">
                    <i class="fa-solid fa-cart-shopping text-2xl text-slate-800"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-blue-600 text-white text-[10px] px-1.5 rounded-full border-2 border-white font-bold">0</span>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-6">
        <div class="mb-6">
            <div class="slider-wrapper">
                <div id="imageSlider" class="slider-container"></div>
            </div>
            <div id="thumbContainer" class="flex gap-3 overflow-x-auto no-scrollbar py-4 px-1"></div>
        </div>

        <div class="space-y-4">
            <div class="flex flex-col">
                <h1 id="pName" class="text-xl font-bold text-slate-900 leading-tight mb-2">Loading...</h1>
                <div class="flex items-center gap-3">
                    <span id="pOldPrice" class="text-sm text-slate-400 line-through"></span>
                    <span id="pPrice" class="text-2xl font-black text-blue-600"></span>
                </div>
            </div>

            <input type="hidden" id="pDeliveryVal" value="200">
            <input type="hidden" id="pCodVal" value="0">

            <div class="py-4 border-t border-slate-100">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-3">Description</h3>
                <p id="pDesc" class="text-slate-600 text-sm leading-relaxed whitespace-pre-wrap"></p>
            </div>

            <div class="fixed bottom-0 left-0 w-full p-4 bg-white/90 backdrop-blur-md border-t border-slate-100 flex gap-3 z-40">
                <button onclick="handleAddToCart()" class="flex-1 bg-slate-100 text-slate-900 py-4 rounded-2xl font-bold active:scale-95 transition">Add to Cart</button>
                <button onclick="handleBuyNow()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold active:scale-95 transition shadow-lg shadow-blue-600/20">Buy Now</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBYrmozXYLHxCmLsc8FX6aN6xSvORxXypo",
            authDomain: "waleed-store-f7369.firebaseapp.com",
            databaseURL: "https://waleed-store-f7369-default-rtdb.firebaseio.com/",
            projectId: "waleed-store-f7369",
            storageBucket: "waleed-store-f7369.appspot.com",
            messagingSenderId: "148677610444",
            appId: "1:148677610444:web:2a838575003504f216503c"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function toggleCart() {
            document.getElementById('cartDrawer').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
            renderCart();
        }

        function closeAll() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('cartDrawer').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        if (productId) {
            database.ref('products/' + productId).once('value', (snapshot) => {
                const p = snapshot.val();
                if (p) {
                    document.getElementById('pName').innerText = p.name;
                    document.getElementById('pPrice').innerText = 'Rs. ' + p.price;
                    if(p.originalPrice) document.getElementById('pOldPrice').innerText = 'Rs. ' + p.originalPrice;
                    document.getElementById('pDesc').innerText = p.desc;
                    document.getElementById('pDeliveryVal').value = p.delivery || "200";
                    document.getElementById('pCodVal').value = p.cod_fee || "0";
                    
                    const images = p.images || [p.image];
                    const slider = document.getElementById('imageSlider');
                    const thumbContainer = document.getElementById('thumbContainer');

                    images.forEach((img, index) => {
                        const slide = document.createElement('div');
                        slide.className = 'slide';
                        slide.innerHTML = `<img src="${img}">`;
                        slider.appendChild(slide);

                        const thumb = document.createElement('img');
                        thumb.src = img;
                        thumb.className = `thumb-img ${index === 0 ? 'active' : ''}`;
                        thumb.onclick = () => slider.scrollTo({ left: slider.clientWidth * index, behavior: 'smooth' });
                        thumbContainer.appendChild(thumb);
                    });
                }
            });
        }

        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const list = document.getElementById('cartItemsList');
            let total = 0;
            list.innerHTML = cart.length ? "" : `<div class="text-center py-20 text-slate-400">Your cart is empty</div>`;
            
            cart.forEach((item, index) => {
                const priceNum = parseInt(item.price.replace(/\D/g,''));
                total += priceNum;
                list.innerHTML += `
                    <div class="flex gap-4 bg-slate-50 p-3 rounded-2xl relative">
                        <img src="${item.img}" class="w-16 h-16 rounded-xl object-cover bg-white">
                        <div class="flex-1">
                            <h4 class="text-sm font-bold text-slate-900 truncate w-32">${item.name}</h4>
                            <p class="text-blue-600 font-extrabold text-sm">${item.price}</p>
                        </div>
                        <button onclick="removeFromCart(${index})" class="text-red-400 hover:text-red-600"><i class="fa-solid fa-trash-can"></i></button>
                    </div>`;
            });
            document.getElementById('cartTotal').innerText = 'Rs. ' + total;
            document.getElementById('cart-count').innerText = cart.length;
        }

        function removeFromCart(index) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        function handleAddToCart() {
            const pName = document.getElementById('pName').innerText;
            const pPrice = document.getElementById('pPrice').innerText;
            const img = document.querySelector('.slide img').src;
            
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.push({ name: pName, price: pPrice, img: img });
            localStorage.setItem('cart', JSON.stringify(cart));
            document.getElementById('cart-count').innerText = cart.length;
            toggleCart();
        }

        function handleBuyNow() {
            handleAddToCart();
            window.location.href = 'checkout.html';
        }

        document.getElementById('cart-count').innerText = (JSON.parse(localStorage.getItem('cart')) || []).length;
    </script>
</body>
</html>
