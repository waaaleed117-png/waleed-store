<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Product Details | Waleed Store</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #ffffff; color: #0f172a; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        
        /* Sidebar Styling (Matched with Screenshot) */
        .sidebar { transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); width: 280px; background: white; height: 100vh; position: fixed; left: -280px; top: 0; z-index: 9999; box-shadow: 10px 0 30px rgba(0,0,0,0.1); overflow: hidden; }
        .sidebar.active { left: 0; }
        .sidebar-header { background: #2563eb; padding: 25px 20px; color: white; display: flex; align-items: center; justify-content: space-between; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9998; backdrop-filter: blur(3px); }
        .overlay.active { display: block; }

        /* Brand Logo Centering */
        .brand-logo { display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; }
        .brand-icon { height: 32px; width: auto; object-fit: contain; margin-bottom: 2px; } 
        .brand-name { font-size: 10px; font-weight: 900; line-height: 1; letter-spacing: -0.2px; white-space: nowrap; text-transform: uppercase; }

        /* Existing Styles (No changes) */
        .slider-wrapper { width: 100%; position: relative; border-radius: 2rem; overflow: hidden; background: #f8fafc; border: 1px solid #f1f5f9; }
        .slider-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; width: 100%; aspect-ratio: 1/1; }
        .slider-container::-webkit-scrollbar { display: none; }
        .slide { flex: 0 0 100%; width: 100%; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; }
        .slide img { max-height: 100%; max-width: 100%; object-fit: contain; }
        .thumb-img { width: 60px; height: 60px; object-fit: cover; border-radius: 12px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; background: #f1f5f9; flex-shrink: 0; }
        .thumb-img.active { border-color: #2563eb; transform: scale(1.05); }
        .buy-btn { animation: pulse-ring 2s infinite; }
        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(37, 99, 235, 0); } 100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pt-20">

    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <span class="text-xl font-bold">Menu</span>
            <button onclick="toggleSidebar()" class="text-2xl"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <nav class="p-4 space-y-2">
            <a href="index.html" class="flex items-center gap-4 p-4 text-slate-700 font-bold hover:bg-blue-50 rounded-xl transition">
                <i class="fa-solid fa-house text-blue-600 w-5"></i> Home
            </a>
            <a href="#" class="flex items-center gap-4 p-4 text-slate-700 font-bold hover:bg-blue-50 rounded-xl transition">
                <i class="fa-solid fa-envelope text-blue-600 w-5"></i> Contact Us
            </a>
        </nav>
    </div>

    <nav class="glass fixed w-full top-0 z-[5000] px-4 py-2 border-b border-slate-100">
        <div class="container mx-auto grid grid-cols-3 items-center">
            <div class="flex justify-start">
                <button onclick="toggleSidebar()" class="text-2xl p-2 text-blue-900">
                    <i class="fa-solid fa-bars-staggered"></i>
                </button>
            </div>
            
            <div class="flex justify-center">
                <a href="index.html" class="brand-logo">
                    <img src="https://i.ibb.co/m5ZzWp7/logo.png" alt="Waleed Store Logo" class="brand-icon">
                    <div class="brand-name">
                        <span class="text-slate-900">Waleed</span>
                        <span class="text-blue-600 ml-0.5">Store</span>
                    </div>
                </a>
            </div>
            
            <div class="flex justify-end items-center">
                <div class="relative p-1 cursor-pointer" onclick="window.location.href='checkout.html'">
                    <i class="fa-solid fa-cart-shopping text-2xl text-slate-800"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-blue-600 text-white text-[10px] px-1.5 rounded-full border-2 border-white font-bold">0</span>
                </div>
            </div>
        </div>
    </nav>

    <div class="fixed top-[75px] right-4 z-[4500]">
        <button onclick="history.back()" class="bg-white/90 backdrop-blur text-slate-400 w-10 h-10 rounded-full flex items-center justify-center shadow-md border border-slate-100 active:scale-90 transition-transform">
            <i class="fa-solid fa-arrow-left text-lg"></i>
        </button>
    </div>

    <div class="container mx-auto px-4 py-6">
        <div class="mb-6">
            <div class="slider-wrapper">
                <div id="imageSlider" class="slider-container"></div>
            </div>
            <div id="thumbContainer" class="flex gap-3 overflow-x-auto no-scrollbar py-4 px-1"></div>
        </div>

        <div class="space-y-4">
            <div class="flex flex-col">
                <h1 id="pName" class="text-xl font-bold text-slate-900 leading-tight mb-2">Loading...</h1>
                <div class="flex items-center gap-3">
                    <span id="pOldPrice" class="text-sm text-slate-400 line-through"></span>
                    <span id="pPrice" class="text-2xl font-extrabold text-blue-600"></span>
                </div>
            </div>

            <input type="hidden" id="pDeliveryVal" value="200">
            <input type="hidden" id="pCodVal" value="0">

            <div class="py-4 border-t border-slate-100">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Description</h3>
                <p id="pDesc" class="text-slate-600 text-sm leading-relaxed whitespace-pre-wrap"></p>
            </div>

            <div class="fixed bottom-0 left-0 w-full p-4 bg-white/90 backdrop-blur-md border-t border-slate-100 flex gap-3 z-40">
                <button onclick="handleAddToCart()" class="flex-1 bg-slate-100 text-slate-900 py-4 rounded-2xl font-bold text-sm active:scale-95 transition">Add to Cart</button>
                <button onclick="handleBuyNow()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold text-sm buy-btn active:scale-95 transition shadow-lg shadow-blue-600/20">Buy Now</button>
            </div>
        </div>
    </div>

    <div class="h-24"></div>

    <footer class="py-10 text-center text-slate-400 text-[10px] bg-slate-50 tracking-widest uppercase border-t border-slate-100">
        © 2026 WALEED STORE. PREMIUM QUALITY.
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBYrmozXYLHxCmLsc8FX6aN6xSvORxXypo",
            authDomain: "waleed-store-f7369.firebaseapp.com",
            databaseURL: "https://waleed-store-f7369-default-rtdb.firebaseio.com/",
            projectId: "waleed-store-f7369",
            storageBucket: "waleed-store-f7369.appspot.com",
            messagingSenderId: "148677610444",
            appId: "1:148677610444:web:2a838575003504f216503c"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Sidebar Toggle with Overlay
        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('active'); 
            document.getElementById('overlay').classList.toggle('active');
        }

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        if (productId) {
            database.ref('products/' + productId).once('value', (snapshot) => {
                const p = snapshot.val();
                if (p) {
                    document.getElementById('pName').innerText = p.name;
                    document.getElementById('pPrice').innerText = 'Rs. ' + p.price;
                    if(p.originalPrice) document.getElementById('pOldPrice').innerText = 'Rs. ' + p.originalPrice;
                    document.getElementById('pDesc').innerText = p.desc;
                    document.getElementById('pDeliveryVal').value = p.delivery || "200";
                    document.getElementById('pCodVal').value = p.cod_fee || "0";
                    
                    const images = p.images || [p.image];
                    const slider = document.getElementById('imageSlider');
                    const thumbContainer = document.getElementById('thumbContainer');

                    images.forEach((img, index) => {
                        const slide = document.createElement('div');
                        slide.className = 'slide';
                        slide.innerHTML = `<img src="${img}">`;
                        slider.appendChild(slide);

                        const thumb = document.createElement('img');
                        thumb.src = img;
                        thumb.className = `thumb-img ${index === 0 ? 'active' : ''}`;
                        thumb.onclick = () => { slider.scrollTo({ left: slider.clientWidth * index, behavior: 'smooth' }); };
                        thumbContainer.appendChild(thumb);
                    });

                    slider.addEventListener('scroll', () => {
                        const index = Math.round(slider.scrollLeft / slider.clientWidth);
                        document.querySelectorAll('.thumb-img').forEach((t, i) => t.classList.toggle('active', i === index));
                    });
                }
            });
        }

        function updateCartBadge() {
            let currentCart = JSON.parse(localStorage.getItem('cart')) || [];
            document.getElementById('cart-count').innerText = currentCart.length;
        }

        function handleAddToCart() {
            const pName = document.getElementById('pName').innerText;
            const pPrice = document.getElementById('pPrice').innerText;
            const imgElement = document.querySelector('.slide img');
            const item = { name: pName, price: pPrice, img: imgElement ? imgElement.src : "" };
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.push(item);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartBadge();
            alert("Added to cart!");
        }

        function handleBuyNow() {
            handleAddToCart();
            window.location.href = 'checkout.html'; 
        }

        updateCartBadge();
    </script>
</body>
</html>
