<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Product Details | Waleed Store</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #ffffff; color: #0f172a; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        
        /* Fixed Swipe Slider Logic */
        .slider-wrapper {
            width: 100%;
            position: relative;
            border-radius: 2rem;
            overflow: hidden;
            background: #f8fafc;
            border: 1px solid #f1f5f9;
        }

        .slider-container { 
            display: flex; 
            overflow-x: auto; 
            scroll-snap-type: x mandatory; 
            scroll-behavior: smooth; 
            -webkit-overflow-scrolling: touch;
            width: 100%;
            aspect-ratio: 1/1;
        }
        .slider-container::-webkit-scrollbar { display: none; }

        .slide { 
            flex: 0 0 100%; /* Yeh har image ko 100% width par fix rakhega */
            width: 100%;
            scroll-snap-align: start; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .slide img { max-height: 100%; max-width: 100%; object-fit: contain; }
        .slide iframe { width: 100%; height: 100%; border: none; }

        .thumb-img { width: 60px; height: 60px; object-fit: cover; border-radius: 12px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; background: #f1f5f9; flex-shrink: 0; }
        .thumb-img.active { border-color: #2563eb; transform: scale(1.05); }
        
        .buy-btn { animation: pulse-ring 2s infinite; }
        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(37, 99, 235, 0); } 100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pt-20">

    <nav class="glass fixed w-full top-0 z-50 px-4 py-2 border-b border-slate-100">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-1">
                <span class="text-xl font-extrabold text-slate-900">Waleed</span>
                <span class="text-xl font-extrabold text-blue-600">Store</span>
            </a>
            <div class="flex items-center gap-4">
                <div class="relative p-1 cursor-pointer" onclick="window.location.href='checkout.html'">
                    <i class="fa-solid fa-cart-shopping text-xl text-slate-800"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-blue-600 text-white text-[9px] px-1.5 rounded-full border border-white font-bold">0</span>
                </div>
                <button onclick="history.back()" class="text-slate-800 p-2"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-6">
        <div class="mb-6">
            <div class="slider-wrapper">
                <div id="imageSlider" class="slider-container">
                    </div>
            </div>
            <div id="thumbContainer" class="flex gap-3 overflow-x-auto no-scrollbar py-4 px-1">
            </div>
        </div>

        <div class="space-y-4">
            <div class="flex justify-between items-start">
                <h1 id="pName" class="text-2xl font-bold text-slate-900 leading-tight">Loading...</h1>
                <span id="pPrice" class="text-xl font-extrabold text-blue-600 whitespace-nowrap ml-4"></span>
            </div>

            <input type="hidden" id="pDeliveryVal" value="200">

            <div class="py-4 border-t border-slate-100">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">Description</h3>
                <p id="pDesc" class="text-slate-600 text-sm leading-relaxed whitespace-pre-wrap"></p>
            </div>

            <div class="fixed bottom-0 left-0 w-full p-4 bg-white/80 backdrop-blur-md border-t border-slate-100 flex gap-3 z-40">
                <button onclick="handleAddToCart()" class="flex-1 bg-slate-100 text-slate-900 py-4 rounded-2xl font-bold text-sm active:scale-95 transition">Add to Cart</button>
                <button onclick="handleBuyNow()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold text-sm buy-btn active:scale-95 transition shadow-lg shadow-blue-600/20">Buy Now</button>
            </div>
        </div>
    </div>

    <div class="h-24"></div>

    <footer class="py-10 text-center text-slate-400 text-[9px] bg-slate-50 tracking-widest uppercase border-t border-slate-100">
        © 2026 WALEED STORE. PREMIUM QUALITY ASSURED.
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBYrmozXYLHxCmLsc8FX6aN6xSvORxXypo",
            authDomain: "waleed-store-f7369.firebaseapp.com",
            databaseURL: "https://waleed-store-f7369-default-rtdb.firebaseio.com/",
            projectId: "waleed-store-f7369",
            storageBucket: "waleed-store-f7369.appspot.com",
            messagingSenderId: "148677610444",
            appId: "1:148677610444:web:2a838575003504f216503c"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        if (productId) {
            database.ref('products/' + productId).once('value', (snapshot) => {
                const p = snapshot.val();
                if (p) {
                    document.getElementById('pName').innerText = p.name;
                    document.getElementById('pPrice').innerText = 'Rs. ' + p.price;
                    document.getElementById('pDesc').innerText = p.desc;
                    document.getElementById('pDeliveryVal').value = p.delivery || "200";
                    
                    const images = p.images || [p.image];
                    const slider = document.getElementById('imageSlider');
                    const thumbContainer = document.getElementById('thumbContainer');

                    images.forEach((img, index) => {
                        const slide = document.createElement('div');
                        slide.className = 'slide';
                        slide.innerHTML = `<img src="${img}">`;
                        slider.appendChild(slide);

                        const thumb = document.createElement('img');
                        thumb.src = img;
                        thumb.className = `thumb-img ${index === 0 ? 'active' : ''}`;
                        thumb.onclick = () => {
                            slider.scrollTo({ left: slider.clientWidth * index, behavior: 'smooth' });
                        };
                        thumbContainer.appendChild(thumb);
                    });

                    if (p.video) {
                        const vidId = p.video.includes('v=') ? p.video.split('v=')[1].split('&')[0] : p.video.split('/').pop();
                        const videoSlide = document.createElement('div');
                        videoSlide.className = 'slide';
                        videoSlide.innerHTML = `<iframe src="https://www.youtube.com/embed/${vidId}" allowfullscreen></iframe>`;
                        slider.appendChild(videoSlide);

                        const videoThumb = document.createElement('div');
                        videoThumb.className = 'thumb-img flex items-center justify-center bg-slate-800 text-white';
                        videoThumb.innerHTML = `<i class="fa-solid fa-play"></i>`;
                        videoThumb.onclick = () => {
                            slider.scrollTo({ left: slider.scrollWidth, behavior: 'smooth' });
                        };
                        thumbContainer.appendChild(videoThumb);
                    }

                    slider.addEventListener('scroll', () => {
                        const index = Math.round(slider.scrollLeft / slider.clientWidth);
                        const allThumbs = document.querySelectorAll('.thumb-img');
                        allThumbs.forEach((t, i) => {
                            t.classList.toggle('active', i === index);
                        });
                    });
                }
            });
        }

        function updateCartBadge() {
            let currentCart = JSON.parse(localStorage.getItem('cart')) || [];
            const countElement = document.getElementById('cart-count');
            if(countElement) {
                countElement.innerText = currentCart.length;
            }
        }

        function handleAddToCart() {
            const pName = document.getElementById('pName').innerText;
            const pPrice = document.getElementById('pPrice').innerText;
            const imgElement = document.querySelector('.slide img');
            const pImg = imgElement ? imgElement.src : "";
            const pDelivery = document.getElementById('pDeliveryVal').value;

            const item = { name: pName, price: pPrice, img: pImg, deliveryCharges: pDelivery };
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.push(item);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartBadge();
        }

        function handleBuyNow() {
            const pName = document.getElementById('pName').innerText;
            const pPrice = document.getElementById('pPrice').innerText;
            const imgElement = document.querySelector('.slide img');
            const pImg = imgElement ? imgElement.src : "";
            const pDelivery = document.getElementById('pDeliveryVal').value;

            const directItem = [{ name: pName, price: pPrice, img: pImg, deliveryCharges: pDelivery }];
            
            // Buy Now ke liye cart ko replace karein taake checkout par sirf aik hi product jaye
            localStorage.setItem('cart', JSON.stringify(directItem));
            window.location.href = 'checkout.html'; 
        }

        updateCartBadge();
    </script>
</body>
</html>
