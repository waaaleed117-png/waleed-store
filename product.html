<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Product Details | Waleed Store</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body { font-family: 'Poppins', sans-serif; background: #ffffff; color: #0f172a; overflow-x: hidden; }
        
        /* Header Fix */
        .main-nav { height: 60px; background: white; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; padding: 0 15px; position: fixed; top: 0; width: 100%; z-index: 5000; }
        .nav-grid { display: grid; grid-template-columns: 1fr auto 1fr; width: 100%; align-items: center; }
        
        /* Logo Fix */
        .brand-icon { width: 35px; height: 35px; object-fit: contain; }
        .brand-text { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.5px; line-height: 1; margin-top: 2px; }

        /* Sidebar Style */
        .sidebar { transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); width: 80%; max-width: 300px; background: white; height: 100vh; position: fixed; left: -100%; top: 0; z-index: 6000; }
        .sidebar.active { left: 0; }
        .sidebar-header { background: #2563eb; color: white; padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 18px; }
        
        /* Cart Drawer (Width Fixed to ~Half Screen) */
        .cart-drawer { transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); width: 65%; max-width: 320px; background: white; height: 100vh; position: fixed; right: -100%; top: 0; z-index: 6000; display: flex; flex-direction: column; box-shadow: -5px 0 25px rgba(0,0,0,0.1); }
        .cart-drawer.active { right: 0; }
        .cart-header { padding: 15px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; font-weight: 800; font-size: 16px; }

        /* Overlay */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 5500; backdrop-filter: blur(2px); }
        .overlay.active { display: block; }

        /* Slider & Components */
        .slider-wrapper { width: 100%; position: relative; border-radius: 1.5rem; overflow: hidden; background: #f8fafc; border: 1px solid #f1f5f9; }
        .slider-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; width: 100%; aspect-ratio: 1/1; }
        .slider-container::-webkit-scrollbar { display: none; }
        .slide { flex: 0 0 100%; width: 100%; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; }
        .slide img { max-height: 100%; max-width: 100%; object-fit: contain; }
        .thumb-img { width: 55px; height: 55px; object-fit: cover; border-radius: 10px; cursor: pointer; border: 2px solid transparent; flex-shrink: 0; }
        .thumb-img.active { border-color: #2563eb; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pt-[70px]">

    <div id="overlay" class="overlay" onclick="closeAll()"></div>

    <nav class="main-nav">
        <div class="nav-grid">
            <div class="flex justify-start">
                <button onclick="toggleSidebar()" class="text-blue-600 text-xl p-2">
                    <i class="fa-solid fa-bars-staggered"></i>
                </button>
            </div>
            
            <div class="flex flex-col items-center">
                <img src="https://i.ibb.co/MkzmytwF/e13258a2b49aef72b89a49f114500d18.jpg" class="brand-icon">
                <div class="brand-text">WALEED <span class="text-blue-600">STORE</span></div>
            </div>
            
            <div class="flex justify-end">
                <div class="relative p-2 cursor-pointer" onclick="toggleCart()">
                    <i class="fa-solid fa-cart-shopping text-xl text-slate-800"></i>
                    <span id="cart-count" class="absolute top-0 right-0 bg-blue-600 text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full border border-white font-bold">0</span>
                </div>
            </div>
        </div>
    </nav>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <span>Menu</span>
            <button onclick="toggleSidebar()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <nav class="p-4">
            <a href="https://waleedstore.me" class="flex items-center gap-4 p-4 text-slate-700 font-semibold border-b border-slate-50">
                <i class="fa-solid fa-house text-blue-600 w-5"></i> Home
            </a>
            <a href="https://waleedstore.me/#contact-section" class="flex items-center gap-4 p-4 text-slate-700 font-semibold border-b border-slate-50">
                <i class="fa-solid fa-envelope text-blue-600 w-5"></i> Contact Us
            </a>
        </nav>
    </div>

    <div id="cartDrawer" class="cart-drawer">
        <div class="cart-header">
            <span>Your Cart</span>
            <button onclick="toggleCart()" class="text-slate-400"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="cartItemsList" class="flex-1 overflow-y-auto p-4 space-y-4">
        </div>
        <div class="p-4 border-t space-y-3 bg-white">
            <div class="flex justify-between items-center">
                <span class="text-slate-500 font-bold uppercase text-[10px] tracking-widest">Total</span>
                <span id="cartTotal" class="text-lg font-black text-blue-600">Rs. 0</span>
            </div>
            <button onclick="window.location.href='checkout.html'" class="w-full bg-slate-900 text-white py-3.5 rounded-xl font-bold uppercase text-xs tracking-widest">Check Out</button>
        </div>
    </div>

    <div class="container mx-auto px-4">
        <div class="mb-4">
            <div class="slider-wrapper">
                <div id="imageSlider" class="slider-container"></div>
            </div>
            <div id="thumbContainer" class="flex gap-2 overflow-x-auto no-scrollbar py-3"></div>
        </div>

        <div class="pb-32">
            <h1 id="pName" class="text-lg font-bold text-slate-900 mb-1">Loading...</h1>
            <div class="flex items-center gap-3 mb-6">
                <span id="pOldPrice" class="text-sm text-slate-400 line-through"></span>
                <span id="pPrice" class="text-xl font-black text-blue-600"></span>
            </div>

            <div class="pt-5 border-t border-slate-100">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3">Product Description</h3>
                <p id="pDesc" class="text-slate-600 text-sm leading-relaxed whitespace-pre-wrap"></p>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full p-4 bg-white/95 backdrop-blur-md border-t border-slate-100 flex gap-3 z-40">
        <button onclick="handleAddToCart()" class="flex-1 bg-slate-100 text-slate-900 py-4 rounded-xl font-bold text-sm">Add to Cart</button>
        <button onclick="handleBuyNow()" class="flex-1 bg-blue-600 text-white py-4 rounded-xl font-bold text-sm shadow-lg shadow-blue-200">Buy Now</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBYrmozXYLHxCmLsc8FX6aN6xSvORxXypo",
            authDomain: "waleed-store-f7369.firebaseapp.com",
            databaseURL: "https://waleed-store-f7369-default-rtdb.firebaseio.com/",
            projectId: "waleed-store-f7369",
            storageBucket: "waleed-store-f7369.appspot.com",
            messagingSenderId: "148677610444",
            appId: "1:148677610444:web:2a838575003504f216503c"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function toggleCart() {
            document.getElementById('cartDrawer').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
            renderCart();
        }

        function closeAll() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('cartDrawer').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        if (productId) {
            database.ref('products/' + productId).once('value', (snapshot) => {
                const p = snapshot.val();
                if (p) {
                    document.getElementById('pName').innerText = p.name;
                    document.getElementById('pPrice').innerText = 'Rs. ' + p.price;
                    if(p.originalPrice) document.getElementById('pOldPrice').innerText = 'Rs. ' + p.originalPrice;
                    document.getElementById('pDesc').innerText = p.desc;
                    
                    const images = p.images || [p.image];
                    const slider = document.getElementById('imageSlider');
                    const thumbContainer = document.getElementById('thumbContainer');

                    images.forEach((img, index) => {
                        const slide = document.createElement('div');
                        slide.className = 'slide';
                        slide.innerHTML = `<img src="${img}">`;
                        slider.appendChild(slide);

                        const thumb = document.createElement('img');
                        thumb.src = img;
                        thumb.className = `thumb-img ${index === 0 ? 'active' : ''}`;
                        thumb.onclick = () => slider.scrollTo({ left: slider.clientWidth * index, behavior: 'smooth' });
                        thumbContainer.appendChild(thumb);
                    });
                }
            });
        }

        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const list = document.getElementById('cartItemsList');
            let total = 0;
            list.innerHTML = cart.length ? "" : `<div class="text-center py-20 text-slate-300 text-xs">Cart is empty</div>`;
            
            cart.forEach((item, index) => {
                const priceNum = parseInt(item.price.toString().replace(/\D/g,''));
                total += priceNum;
                list.innerHTML += `
                    <div class="flex gap-3 bg-slate-50 p-2.5 rounded-xl border border-slate-100">
                        <img src="${item.img}" class="w-12 h-12 rounded-lg object-cover bg-white border">
                        <div class="flex-1 min-w-0">
                            <h4 class="text-[11px] font-bold text-slate-800 truncate">${item.name}</h4>
                            <p class="text-blue-600 font-black text-[12px]">${item.price}</p>
                        </div>
                        <button onclick="removeFromCart(${index})" class="text-slate-300 hover:text-red-500"><i class="fa-solid fa-trash-can text-xs"></i></button>
                    </div>`;
            });
            document.getElementById('cartTotal').innerText = 'Rs. ' + total;
            document.getElementById('cart-count').innerText = cart.length;
        }

        function removeFromCart(index) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        function handleAddToCart() {
            const pName = document.getElementById('pName').innerText;
            const pPrice = document.getElementById('pPrice').innerText;
            const img = document.querySelector('.slide img').src;
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.push({ name: pName, price: pPrice, img: img });
            localStorage.setItem('cart', JSON.stringify(cart));
            document.getElementById('cart-count').innerText = cart.length;
            toggleCart();
        }

        function handleBuyNow() {
            handleAddToCart();
            window.location.href = 'checkout.html';
        }

        document.getElementById('cart-count').innerText = (JSON.parse(localStorage.getItem('cart')) || []).length;
    </script>
</body>
</html>
