<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Product Details | Waleed Store</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Poppins:wght@400;600;800&display=swap');
        
        /* Dark Theme Matching your Index */
        body { font-family: 'Inter', sans-serif; background: #0a0f1c; color: #e2e8f0; overflow-x: hidden; }
        
        /* Sidebar Styling from Index */
        .sidebar { transition: 0.3s; width: 260px; background: #111827; height: 100vh; position: fixed; left: -260px; z-index: 6000; }
        .sidebar.active { left: 0; }
        
        .glass-header { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }

        .slider-wrapper {
            width: 100%;
            position: relative;
            border-radius: 1.5rem;
            overflow: hidden;
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .slider-container { 
            display: flex; 
            overflow-x: auto; 
            scroll-snap-type: x mandatory; 
            scroll-behavior: smooth; 
            -webkit-overflow-scrolling: touch;
            width: 100%;
            aspect-ratio: 1/1;
        }
        .slider-container::-webkit-scrollbar { display: none; }

        .slide { 
            flex: 0 0 100%; 
            width: 100%;
            scroll-snap-align: start; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .slide img { max-height: 100%; max-width: 100%; object-fit: contain; }
        .slide iframe { width: 100%; height: 100%; border: none; }

        .thumb-img { width: 60px; height: 60px; object-fit: cover; border-radius: 12px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; background: #1e293b; flex-shrink: 0; }
        .thumb-img.active { border-color: #3b82f6; transform: scale(1.05); }
        
        .buy-btn { animation: pulse-ring 2s infinite; }
        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pt-20">

    <div id="sidebar" class="sidebar border-r border-slate-800 p-6">
        <div class="flex items-center justify-between mb-10">
            <span class="text-xl font-bold text-blue-500">Waleed Store</span>
            <button onclick="toggleSidebar()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <nav class="space-y-4">
            <a href="index.html" class="w-full text-left p-3 rounded-xl hover:bg-blue-600/10 hover:text-blue-400 transition flex items-center gap-3">
                <i class="fa-solid fa-house"></i> Home
            </a>
            <a href="checkout.html" class="w-full text-left p-3 rounded-xl hover:bg-blue-600/10 hover:text-blue-400 transition flex items-center gap-3">
                <i class="fa-solid fa-cart-shopping"></i> My Cart
            </a>
        </nav>
    </div>

    <nav class="glass-header fixed w-full top-0 z-[5000] px-4 py-3">
        <div class="container mx-auto flex items-center justify-between">
            <button onclick="toggleSidebar()" class="text-xl p-2 bg-slate-800 rounded-lg text-blue-500">
                <i class="fa-solid fa-bars-staggered"></i>
            </button>

            <a href="index.html" class="flex flex-col items-center">
                <img src="https://i.ibb.co/34302/cart-logo.png" alt="Logo" class="w-8 h-8 mb-1">
                <div class="flex items-center gap-1">
                    <span class="text-xs font-bold text-white uppercase">Waleed</span>
                    <span class="text-xs font-bold text-blue-500 uppercase">Store</span>
                </div>
            </a>

            <div class="flex items-center">
                <div class="relative p-2 cursor-pointer" onclick="window.location.href='checkout.html'">
                    <i class="fa-solid fa-cart-shopping text-xl text-slate-300"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-blue-600 text-white text-[9px] px-1.5 rounded-full border border-slate-900 font-bold">0</span>
                </div>
            </div>
        </div>
    </nav>

    <div class="fixed top-[85px] right-4 z-[4000]">
        <button onclick="history.back()" class="bg-slate-800 text-slate-400 w-9 h-9 rounded-full flex items-center justify-center shadow-lg border border-slate-700 active:scale-90 transition-transform">
            <i class="fa-solid fa-xmark text-lg"></i>
        </button>
    </div>

    <div class="container mx-auto px-4 py-6">
        <div class="mb-6">
            <div class="slider-wrapper">
                <div id="imageSlider" class="slider-container"></div>
            </div>
            <div id="thumbContainer" class="flex gap-3 overflow-x-auto no-scrollbar py-4 px-1"></div>
        </div>

        <div class="space-y-4">
            <div class="flex flex-col">
                <h1 id="pName" class="text-xl font-bold text-white leading-tight">Loading...</h1>
                <div class="flex items-center gap-3 mt-1">
                    <span id="pOldPrice" class="text-sm text-slate-500 line-through"></span>
                    <span id="pPrice" class="text-2xl font-black text-blue-500"></span>
                </div>
            </div>

            <input type="hidden" id="pDeliveryVal" value="200">
            <input type="hidden" id="pCodVal" value="0">

            <div class="py-4 border-t border-slate-800">
                <h3 class="text-xs font-bold text-blue-400 uppercase tracking-widest mb-2">Description</h3>
                <p id="pDesc" class="text-slate-400 text-sm leading-relaxed whitespace-pre-wrap"></p>
            </div>

            <div class="fixed bottom-0 left-0 w-full p-4 bg-slate-900/90 backdrop-blur-md border-t border-slate-800 flex gap-3 z-40">
                <button onclick="handleAddToCart()" class="flex-1 bg-slate-800 text-white py-4 rounded-2xl font-bold text-sm border border-slate-700 active:scale-95 transition">Add to Cart</button>
                <button onclick="handleBuyNow()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold text-sm buy-btn active:scale-95 transition shadow-lg shadow-blue-600/20">Buy Now</button>
            </div>
        </div>
    </div>

    <div class="h-24"></div>

    <footer class="py-10 text-center text-slate-600 text-[9px] bg-slate-900/50 tracking-widest uppercase border-t border-slate-800">
        © 2026 WALEED STORE. PREMIUM QUALITY ASSURED.
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBYrmozXYLHxCmLsc8FX6aN6xSvORxXypo",
            authDomain: "waleed-store-f7369.firebaseapp.com",
            databaseURL: "https://waleed-store-f7369-default-rtdb.firebaseio.com/",
            projectId: "waleed-store-f7369",
            storageBucket: "waleed-store-f7369.appspot.com",
            messagingSenderId: "148677610444",
            appId: "1:148677610444:web:2a838575003504f216503c"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        if (productId) {
            database.ref('products/' + productId).once('value', (snapshot) => {
                const p = snapshot.val();
                if (p) {
                    document.getElementById('pName').innerText = p.name;
                    document.getElementById('pPrice').innerText = 'Rs. ' + p.price;
                    if(p.originalPrice) {
                        document.getElementById('pOldPrice').innerText = 'Rs. ' + p.originalPrice;
                    }
                    document.getElementById('pDesc').innerText = p.desc;
                    document.getElementById('pDeliveryVal').value = p.delivery || "200";
                    document.getElementById('pCodVal').value = p.cod_fee || "0";
                    
                    const images = p.images || [p.image];
                    const slider = document.getElementById('imageSlider');
                    const thumbContainer = document.getElementById('thumbContainer');

                    images.forEach((img, index) => {
                        const slide = document.createElement('div');
                        slide.className = 'slide';
                        slide.innerHTML = `<img src="${img}">`;
                        slider.appendChild(slide);

                        const thumb = document.createElement('img');
                        thumb.src = img;
                        thumb.className = `thumb-img ${index === 0 ? 'active' : ''}`;
                        thumb.onclick = () => {
                            slider.scrollTo({ left: slider.clientWidth * index, behavior: 'smooth' });
                        };
                        thumbContainer.appendChild(thumb);
                    });

                    if (p.video) {
                        const vidId = p.video.includes('v=') ? p.video.split('v=')[1].split('&')[0] : p.video.split('/').pop();
                        const videoSlide = document.createElement('div');
                        videoSlide.className = 'slide';
                        videoSlide.innerHTML = `<iframe src="https://www.youtube.com/embed/${vidId}" allowfullscreen></iframe>`;
                        slider.appendChild(videoSlide);

                        const videoThumb = document.createElement('div');
                        videoThumb.className = 'thumb-img flex items-center justify-center bg-slate-800 text-white';
                        videoThumb.innerHTML = `<i class="fa-solid fa-play"></i>`;
                        videoThumb.onclick = () => {
                            slider.scrollTo({ left: slider.scrollWidth, behavior: 'smooth' });
                        };
                        thumbContainer.appendChild(videoThumb);
                    }

                    slider.addEventListener('scroll', () => {
                        const index = Math.round(slider.scrollLeft / slider.clientWidth);
                        const allThumbs = document.querySelectorAll('.thumb-img');
                        allThumbs.forEach((t, i) => {
                            t.classList.toggle('active', i === index);
                        });
                    });
                }
            });
        }

        function updateCartBadge() {
            let currentCart = JSON.parse(localStorage.getItem('cart')) || [];
            const countElement = document.getElementById('cart-count');
            if(countElement) {
                countElement.innerText = currentCart.length;
            }
        }

        function handleAddToCart() {
            const pName = document.getElementById('pName').innerText;
            const pPrice = document.getElementById('pPrice').innerText;
            const imgElement = document.querySelector('.slide img');
            const pImg = imgElement ? imgElement.src : "";
            const pDelivery = document.getElementById('pDeliveryVal').value;
            const pCod = document.getElementById('pCodVal').value;

            const item = { name: pName, price: pPrice, img: pImg, deliveryCharges: pDelivery, codFee: pCod };
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.push(item);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartBadge();
        }

        function handleBuyNow() {
            handleAddToCart();
            window.location.href = 'checkout.html'; 
        }

        updateCartBadge();
    </script>
</body>
</html>
