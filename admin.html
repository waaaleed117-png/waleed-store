<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Multi-Image Upload</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Poppins', sans-serif; }
        .card { background: #1e293b; border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        input { background: #334155; border: none; padding: 10px; border-radius: 8px; width: 100%; color: white; margin-bottom: 10px; }
        button { background: #2563eb; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold text-center mb-6 text-blue-400">Add Product (Multi-Image)</h1>
        
        <div class="card">
            <input type="text" id="pName" placeholder="Product Name">
            <input type="number" id="pPrice" placeholder="Price (Rs.)">
            
            <p class="text-xs text-slate-400 mb-2">Upload up to 4 Images:</p>
            <input type="file" class="pImg" accept="image/*">
            <input type="file" class="pImg" accept="image/*">
            <input type="file" class="pImg" accept="image/*">
            <input type="file" class="pImg" accept="image/*">

            <p class="text-xs text-yellow-500 mb-2 mt-2">YouTube Video Link (Optional):</p>
            <input type="text" id="pVideo" placeholder="https://youtube.com/...">

            <button id="uploadBtn" onclick="uploadAll()">Upload to Store</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBYrmozXYLHxCmLsc8FX6aN6xSvORxXypo",
            authDomain: "waleed-store-f7369.firebaseapp.com",
            databaseURL: "https://waleed-store-f7369-default-rtdb.firebaseio.com/",
            projectId: "waleed-store-f7369",
            storageBucket: "waleed-store-f7369.appspot.com",
            messagingSenderId: "148677610444",
            appId: "1:148677610444:web:2a838575003504f216503c"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const imgbbKey = "2d7d1d644318674d9d8dcd961cb666ae";

        async function uploadAll() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const video = document.getElementById('pVideo').value;
            const fileInputs = document.querySelectorAll('.pImg');
            const btn = document.getElementById('uploadBtn');

            if (!name || !price) return alert("Fill Name and Price");

            btn.disabled = true;
            btn.innerHTML = '<div class="loader"></div> Uploading Images...';

            let uploadedUrls = [];

            try {
                for (let input of fileInputs) {
                    if (input.files[0]) {
                        const formData = new FormData();
                        formData.append("image", input.files[0]);
                        const res = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, { method: "POST", body: formData });
                        const data = await res.json();
                        uploadedUrls.push(data.data.url);
                    }
                }

                if (uploadedUrls.length === 0) throw new Error("Select at least 1 image");

                await database.ref('products').push({
                    name, price, video,
                    images: uploadedUrls,
                    date: new Date().toLocaleString()
                });

                alert("Product Added with Multiple Images!");
                location.reload();
            } catch (e) {
                alert(e.message);
                btn.disabled = false;
                btn.innerText = "Upload to Store";
            }
        }
    </script>
</body>
</html>
