<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waleed Store | Pro Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0a0f1c; color: #e2e8f0; }
        .sidebar { transition: 0.3s; width: 260px; background: #111827; height: 100vh; position: fixed; left: -260px; z-index: 100; }
        .sidebar.active { left: 0; }
        .main-content { transition: 0.3s; padding: 20px; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem; }
        .upload-box { border: 2px dashed #334155; transition: 0.3s; cursor: pointer; }
        .upload-box:hover { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden-section { display: none; }
        .order-ss:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="sidebar" class="sidebar border-r border-slate-800 p-6">
        <div class="flex items-center justify-between mb-10">
            <span class="text-xl font-bold text-blue-500">Waleed Pro</span>
            <button onclick="toggleSidebar()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <nav class="space-y-4">
            <button onclick="showSection('add-product')" class="w-full text-left p-3 rounded-xl hover:bg-blue-600/10 hover:text-blue-400 transition flex items-center gap-3">
                <i class="fa-solid fa-plus-circle"></i> Add Product
            </button>
            <button onclick="showSection('manage-products')" class="w-full text-left p-3 rounded-xl hover:bg-blue-600/10 hover:text-blue-400 transition flex items-center gap-3">
                <i class="fa-solid fa-list-check"></i> Manage Products
            </button>
            <button onclick="showSection('view-orders')" class="w-full text-left p-3 rounded-xl hover:bg-blue-600/10 hover:text-blue-400 transition flex items-center gap-3">
                <i class="fa-solid fa-cart-shopping"></i> View Orders
            </button>
        </nav>
    </div>

    <div class="main-content">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="toggleSidebar()" class="text-2xl p-2 bg-slate-800 rounded-lg"><i class="fa-solid fa-bars-staggered"></i></button>
            <h1 id="page-title" class="text-2xl font-bold">Add Product</h1>
        </div>

        <div id="add-product" class="glass-card p-6 max-w-2xl mx-auto shadow-2xl">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="text-xs text-slate-400 ml-2">Product Name</label>
                    <input type="text" id="pName" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl outline-none focus:border-blue-500" placeholder="e.g. Ultra Smart Watch">
                </div>
                <div>
                    <label class="text-xs text-slate-400 ml-2">Price (Rs.)</label>
                    <input type="number" id="pPrice" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl outline-none focus:border-blue-500" placeholder="e.g. 4500">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="text-xs text-slate-400 ml-2">Delivery Charges (Rs.)</label>
                    <input type="number" id="pDelivery" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl outline-none focus:border-blue-500" placeholder="e.g. 200" value="200">
                </div>
                <div>
                    <label class="text-xs text-slate-400 ml-2 text-blue-400 font-bold">Cash on Delivery (COD) Fee (Rs.)</label>
                    <input type="number" id="pCod" class="w-full bg-slate-900/50 border border-blue-900/30 border p-3 rounded-xl outline-none focus:border-blue-500" placeholder="e.g. 50" value="0">
                </div>
            </div>

            <div class="mb-6">
                <label class="text-xs text-slate-400 ml-2">Description</label>
                <textarea id="pDesc" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl h-32 outline-none focus:border-blue-500" placeholder="Write full details here..."></textarea>
            </div>

            <div class="mb-6">
                <label class="text-xs text-slate-400 ml-2">YouTube Video Link</label>
                <input type="text" id="pVideo" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl outline-none focus:border-blue-500" placeholder="YouTube URL">
            </div>

            <div class="mb-8">
                <label class="text-xs text-slate-400 ml-2">Product Images</label>
                <div class="grid grid-cols-2 gap-3 mt-2">
                    <input type="file" class="pImg hidden" id="img1" onchange="updateLabel(1)">
                    <label for="img1" id="lbl1" class="upload-box p-4 rounded-xl text-center text-xs text-slate-500"><i class="fa-solid fa-image mb-2 text-xl"></i><br>Image 1</label>
                    <input type="file" class="pImg hidden" id="img2" onchange="updateLabel(2)">
                    <label for="img2" id="lbl2" class="upload-box p-4 rounded-xl text-center text-xs text-slate-500"><i class="fa-solid fa-image mb-2 text-xl"></i><br>Image 2</label>
                    <input type="file" class="pImg hidden" id="img3" onchange="updateLabel(3)">
                    <label for="img3" id="lbl3" class="upload-box p-4 rounded-xl text-center text-xs text-slate-500"><i class="fa-solid fa-image mb-2 text-xl"></i><br>Image 3</label>
                    <input type="file" class="pImg hidden" id="img4" onchange="updateLabel(4)">
                    <label for="img4" id="lbl4" class="upload-box p-4 rounded-xl text-center text-xs text-slate-500"><i class="fa-solid fa-image mb-2 text-xl"></i><br>Image 4</label>
                </div>
            </div>

            <button id="uploadBtn" onclick="uploadAll()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-500/20 transition active:scale-95">
                Upload to Website
            </button>
        </div>

        <div id="manage-products" class="hidden-section">
            <div id="admin-product-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <div id="view-orders" class="hidden-section">
            <div id="orders-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBYrmozXYLHxCmLsc8FX6aN6xSvORxXypo",
            authDomain: "waleed-store-f7369.firebaseapp.com",
            databaseURL: "https://waleed-store-f7369-default-rtdb.firebaseio.com/",
            projectId: "waleed-store-f7369",
            storageBucket: "waleed-store-f7369.appspot.com",
            messagingSenderId: "148677610444",
            appId: "1:148677610444:web:2a838575003504f216503c"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const imgbbKey = "2d7d1d644318674d9d8dcd961cb666ae";

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

        function showSection(id) {
            document.getElementById('add-product').classList.add('hidden-section');
            document.getElementById('view-orders').classList.add('hidden-section');
            document.getElementById('manage-products').classList.add('hidden-section');
            document.getElementById(id).classList.remove('hidden-section');
            
            const titles = {'add-product': 'Add Product', 'view-orders': 'Customer Orders', 'manage-products': 'Manage Store'};
            document.getElementById('page-title').innerText = titles[id];
            if(window.innerWidth < 768) toggleSidebar();
        }

        function updateLabel(id) {
            const input = document.getElementById('img'+id);
            const label = document.getElementById('lbl'+id);
            if(input.files[0]) {
                label.classList.add('bg-blue-600/20', 'text-blue-400', 'border-blue-500');
                label.innerHTML = `<i class="fa-solid fa-check-circle mb-2 text-xl"></i><br>Selected`;
            }
        }

        async function uploadAll() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const delivery = document.getElementById('pDelivery').value;
            const cod_fee = document.getElementById('pCod').value;
            const desc = document.getElementById('pDesc').value;
            const video = document.getElementById('pVideo').value;
            const fileInputs = document.querySelectorAll('.pImg');
            const btn = document.getElementById('uploadBtn');

            if (!name || !price || !desc) return alert("Fill Name, Price and Description!");
            btn.disabled = true; btn.innerHTML = '<div class="loader"></div> Processing...';

            let uploadedUrls = [];
            try {
                for (let input of fileInputs) {
                    if (input.files[0]) {
                        const formData = new FormData();
                        formData.append("image", input.files[0]);
                        const res = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, { method: "POST", body: formData });
                        const data = await res.json();
                        uploadedUrls.push(data.data.url);
                    }
                }
                await database.ref('products').push({ name, price, delivery, cod_fee, desc, video, images: uploadedUrls, date: new Date().toLocaleString() });
                alert("Product Uploaded!"); location.reload();
            } catch (e) { alert("Failed!"); btn.disabled = false; btn.innerText = "Upload to Website"; }
        }

        // --- MANAGE PRODUCTS LOGIC ---
        database.ref('products').on('value', (snapshot) => {
            const adminList = document.getElementById('admin-product-list');
            adminList.innerHTML = "";
            snapshot.forEach(child => {
                const p = child.val();
                const displayImg = p.images ? p.images[0] : 'https://placehold.co/100x100';
                adminList.innerHTML += `
                    <div class="glass-card p-4 border-l-4 border-yellow-500 flex justify-between items-center">
                        <div class="flex items-center gap-3 truncate">
                            <img src="${displayImg}" class="w-12 h-12 object-cover rounded-lg bg-slate-800">
                            <div>
                                <h3 class="font-bold text-sm text-white truncate">${p.name}</h3>
                                <p class="text-xs text-slate-400">Rs. ${p.price}</p>
                            </div>
                        </div>
                        <button onclick="deleteProduct('${child.key}')" class="text-red-500 p-2 hover:bg-red-500/10 rounded-lg transition"><i class="fa-solid fa-trash-can"></i></button>
                    </div>`;
            });
        });

        function deleteProduct(key) { if(confirm("Delete this product?")) database.ref('products/' + key).remove(); }

        // --- VIEW ORDERS LOGIC (UPDATED WITH SCREENSHOT & COLORS) ---
        database.ref('orders').on('value', (snapshot) => {
            const list = document.getElementById('orders-list');
            list.innerHTML = "";
            snapshot.forEach(child => {
                const o = child.val();
                const key = child.key;
                
                // Color and Screenshot logic
                const isAdvance = o.paymentMethod === 'advance';
                const borderColor = isAdvance ? 'border-green-500' : 'border-yellow-500';
                const methodLabel = isAdvance ? '<span class="text-green-400 text-[10px] font-bold">ADVANCE PAID</span>' : '<span class="text-yellow-400 text-[10px] font-bold">CASH ON DELIVERY</span>';
                
                let ssHtml = "";
                if (isAdvance && o.screenshot && o.screenshot !== "No Screenshot (COD)") {
                    ssHtml = `
                        <div class="mt-4 pt-4 border-t border-slate-700/50">
                            <p class="text-[10px] text-slate-400 uppercase font-bold mb-2">Payment Screenshot:</p>
                            <a href="${o.screenshot}" target="_blank">
                                <img src="${o.screenshot}" class="order-ss w-full h-32 object-cover rounded-xl border border-slate-700 transition cursor-zoom-in">
                            </a>
                        </div>`;
                }

                list.innerHTML += `
                    <div class="glass-card p-5 border-l-4 ${borderColor} mb-4 flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <h3 class="font-extrabold text-blue-400 uppercase tracking-tight">${o.customerName}</h3>
                                    ${methodLabel}
                                </div>
                                <span class="text-[9px] bg-slate-800 px-2 py-1 rounded text-slate-500">${o.date}</span>
                            </div>
                            
                            <div class="space-y-2 text-sm text-slate-300">
                                <p><i class="fa-solid fa-phone mr-2 text-blue-500"></i>${o.customerPhone}</p>
                                <p><i class="fa-solid fa-location-dot mr-2 text-blue-500"></i>${o.customerAddress}, ${o.customerCity}</p>
                                <div class="bg-slate-900/40 p-3 rounded-xl border border-white/5 mt-3">
                                    <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">Items:</p>
                                    <p class="text-white font-medium text-xs leading-relaxed">${o.productName}</p>
                                    <p class="text-blue-400 font-bold mt-2">Bill: ${o.price}</p>
                                </div>
                            </div>
                        </div>

                        ${ssHtml}

                        <button onclick="deleteOrder('${key}')" class="mt-4 text-[10px] text-red-500/50 hover:text-red-500 transition self-end">
                            <i class="fa-solid fa-trash-can mr-1"></i> Delete Order
                        </button>
                    </div>`;
            });
        });

        function deleteOrder(key) { if(confirm("Order delete kar dein?")) database.ref('orders/' + key).remove(); }
    </script>
</body>
</html>
