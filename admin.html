<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waleed Store | Pro Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0a0f1c; color: #e2e8f0; }
        .sidebar { transition: 0.3s; width: 260px; background: #111827; height: 100vh; position: fixed; left: -260px; z-index: 100; }
        .sidebar.active { left: 0; }
        .main-content { transition: 0.3s; padding: 20px; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem; cursor: pointer; transition: 0.2s; }
        .glass-card:hover { transform: translateY(-3px); background: rgba(30, 41, 59, 0.9); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; backdrop-filter: blur(5px); align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .upload-box { border: 2px dashed #334155; transition: 0.3s; cursor: pointer; }
        .upload-box:hover { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden-section { display: none; }
        label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; margin-left: 4px; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="sidebar" class="sidebar border-r border-slate-800 p-6">
        <div class="flex items-center justify-between mb-10">
            <span class="text-xl font-bold text-blue-500">Waleed Pro</span>
            <button onclick="toggleSidebar()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <nav class="space-y-4">
            <button onclick="showSection('add-product')" class="w-full text-left p-3 rounded-xl hover:bg-blue-600/10 hover:text-blue-400 transition flex items-center gap-3">
                <i class="fa-solid fa-plus-circle"></i> Add Product
            </button>
            <button onclick="showSection('manage-slider')" class="w-full text-left p-3 rounded-xl hover:bg-blue-600/10 hover:text-blue-400 transition flex items-center gap-3">
                <i class="fa-solid fa-images"></i> Manage Slider
            </button>
            <button onclick="showSection('manage-products')" class="w-full text-left p-3 rounded-xl hover:bg-blue-600/10 hover:text-blue-400 transition flex items-center gap-3">
                <i class="fa-solid fa-list-check"></i> Manage Products
            </button>
            <button onclick="showSection('view-orders')" class="w-full text-left p-3 rounded-xl hover:bg-blue-600/10 hover:text-blue-400 transition flex items-center gap-3">
                <i class="fa-solid fa-cart-shopping"></i> View Orders
            </button>
        </nav>
    </div>

    <div class="main-content">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="toggleSidebar()" class="text-2xl p-2 bg-slate-800 rounded-lg"><i class="fa-solid fa-bars-staggered"></i></button>
            <h1 id="page-title" class="text-2xl font-bold">Add Product</h1>
        </div>

        <div id="manage-slider" class="hidden-section">
            <div class="glass-card p-6 max-w-xl mx-auto shadow-2xl cursor-default hover:transform-none">
                <h3 class="text-blue-400 font-bold mb-4">Website Slider Images</h3>
                <div class="upload-box p-8 rounded-2xl text-center mb-6" onclick="document.getElementById('sliderFileInput').click()">
                    <i class="fa-solid fa-cloud-arrow-up text-2xl mb-2 text-slate-500"></i>
                    <p class="text-sm text-slate-400" id="sliderUploadStatus">Click to upload banner (Professional Look)</p>
                    <input type="file" id="sliderFileInput" class="hidden" onchange="uploadSliderImage()">
                </div>
                <div id="slider-images-list" class="grid grid-cols-1 gap-4">
                    </div>
            </div>
        </div>

        <div id="add-product" class="glass-card p-6 max-w-2xl mx-auto shadow-2xl cursor-default hover:transform-none">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div><label>Product Name</label><input type="text" id="pName" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl outline-none" placeholder="Enter name"></div>
                <div><label>Price</label><input type="number" id="pPrice" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl outline-none" placeholder="Enter price"></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div><label>Delivery Charges</label><input type="number" id="pDelivery" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl outline-none" value="200"></div>
                <div><label>COD Fee</label><input type="number" id="pCod" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl outline-none" value="0"></div>
            </div>
            <div class="mb-4"><label>Description</label><textarea id="pDesc" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl h-24 outline-none" placeholder="Product description..."></textarea></div>
            <div class="mb-6"><label>YouTube Video Link</label><input type="text" id="pVideo" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl outline-none" placeholder="https://youtube.com/..."></div>
            
            <label>Upload Images (Max 4)</label>
            <div class="grid grid-cols-2 gap-3 mb-8">
                <input type="file" class="pImg hidden" id="img1" onchange="updateLabel(1)"><label for="img1" id="lbl1" class="upload-box p-4 rounded-xl text-center text-xs text-slate-500"><i class="fa-solid fa-image mb-2 text-xl"></i><br>Image 1</label>
                <input type="file" class="pImg hidden" id="img2" onchange="updateLabel(2)"><label for="img2" id="lbl2" class="upload-box p-4 rounded-xl text-center text-xs text-slate-500"><i class="fa-solid fa-image mb-2 text-xl"></i><br>Image 2</label>
                <input type="file" class="pImg hidden" id="img3" onchange="updateLabel(3)"><label for="img3" id="lbl3" class="upload-box p-4 rounded-xl text-center text-xs text-slate-500"><i class="fa-solid fa-image mb-2 text-xl"></i><br>Image 3</label>
                <input type="file" class="pImg hidden" id="img4" onchange="updateLabel(4)"><label for="img4" id="lbl4" class="upload-box p-4 rounded-xl text-center text-xs text-slate-500"><i class="fa-solid fa-image mb-2 text-xl"></i><br>Image 4</label>
            </div>
            <button id="uploadBtn" onclick="uploadAll()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold">Upload Product</button>
        </div>

        <div id="manage-products" class="hidden-section"><div id="admin-product-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div></div>
        <div id="view-orders" class="hidden-section"><div id="orders-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div></div>
    </div>

    <div id="orderModal" class="modal">
        <div class="bg-slate-900 w-full max-w-md rounded-3xl p-6 border border-slate-700 max-h-[90vh] overflow-y-auto relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-400 text-xl"><i class="fa-solid fa-circle-xmark"></i></button>
            <h2 id="modal-title" class="text-xl font-bold text-blue-400 mb-6 text-center uppercase tracking-wider">Details</h2>
            <div id="modal-content" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBYrmozXYLHxCmLsc8FX6aN6xSvORxXypo",
            authDomain: "waleed-store-f7369.firebaseapp.com",
            databaseURL: "https://waleed-store-f7369-default-rtdb.firebaseio.com/",
            projectId: "waleed-store-f7369",
            storageBucket: "waleed-store-f7369.appspot.com",
            messagingSenderId: "148677610444",
            appId: "1:148677610444:web:2a838575003504f216503c"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const imgbbKey = "2d7d1d644318674d9d8dcd961cb666ae";

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function closeModal() { document.getElementById('orderModal').classList.remove('active'); }

        function showSection(id) {
            document.querySelectorAll('.main-content > div:not(.flex)').forEach(div => div.classList.add('hidden-section'));
            document.getElementById(id).classList.remove('hidden-section');
            const titles = {'add-product': 'Add Product', 'view-orders': 'Customer Orders', 'manage-products': 'Manage Store', 'manage-slider': 'Manage Slider'};
            document.getElementById('page-title').innerText = titles[id];
            if(window.innerWidth < 768) toggleSidebar();
        }

        function updateLabel(id) {
            const label = document.getElementById('lbl'+id);
            label.classList.add('bg-blue-600/20', 'text-blue-400', 'border-blue-500');
            label.innerHTML = `<i class="fa-solid fa-check-circle mb-1"></i><br>Ready`;
        }

        // --- NEW SLIDER LOGIC ---
        async function uploadSliderImage() {
            const file = document.getElementById('sliderFileInput').files[0];
            const status = document.getElementById('sliderUploadStatus');
            if(!file) return;

            status.innerHTML = '<div class="loader"></div> Uploading...';
            try {
                const formData = new FormData();
                formData.append("image", file);
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, { method: "POST", body: formData });
                const d = await res.json();
                
                await database.ref('slider').push({ url: d.data.url });
                status.innerText = "Click to upload banner (Professional Look)";
                alert("Slider Image Uploaded!");
            } catch (e) {
                alert("Upload failed!");
                status.innerText = "Click to upload banner (Professional Look)";
            }
        }

        database.ref('slider').on('value', (snapshot) => {
            const list = document.getElementById('slider-images-list');
            list.innerHTML = "";
            snapshot.forEach(child => {
                list.innerHTML += `
                    <div class="relative group rounded-xl overflow-hidden">
                        <img src="${child.val().url}" class="w-full h-32 object-cover border border-slate-700 rounded-xl">
                        <button onclick="deleteSlider('${child.key}')" class="absolute top-2 right-2 bg-red-600 p-2 rounded-lg text-xs opacity-0 group-hover:opacity-100 transition"><i class="fa-solid fa-trash"></i></button>
                    </div>`;
            });
        });

        function deleteSlider(key) { if(confirm("Delete this banner?")) database.ref('slider/' + key).remove(); }

        // --- REST OF YOUR CODE (UNTOUCHED) ---
        database.ref('products').on('value', (snapshot) => {
            const list = document.getElementById('admin-product-list');
            list.innerHTML = "";
            snapshot.forEach(child => {
                const p = child.val();
                const displayImg = p.images ? p.images[0] : 'https://placehold.co/100x100';
                list.innerHTML += `<div class="glass-card p-4 flex gap-3 items-center" onclick='openEditProduct(${JSON.stringify(p)}, "${child.key}")'><img src="${displayImg}" class="w-12 h-12 object-cover rounded-lg"><div><h3 class="font-bold text-sm text-white">${p.name}</h3><p class="text-xs text-slate-400">Rs. ${p.price}</p></div></div>`;
            });
        });

        function openEditProduct(p, key) {
            document.getElementById('modal-title').innerText = "Edit Product";
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <div class="space-y-3">
                    <div><label>Product Name</label><input type="text" id="eName" value="${p.name}" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 outline-none"></div>
                    <div class="grid grid-cols-2 gap-2">
                        <div><label>Price</label><input type="number" id="ePrice" value="${p.price}" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 outline-none"></div>
                        <div><label>Delivery</label><input type="number" id="eDel" value="${p.delivery || 200}" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 outline-none"></div>
                    </div>
                    <div><label>COD Fee</label><input type="number" id="eCod" value="${p.cod_fee || 0}" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 outline-none"></div>
                    <div><label>Description</label><textarea id="eDesc" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 h-24 outline-none">${p.desc}</textarea></div>
                    <div><label>YouTube Link</label><input type="text" id="eVideo" value="${p.video || ''}" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 outline-none"></div>
                    <div class="grid grid-cols-2 gap-2 pt-4">
                        <button onclick="updateProduct('${key}')" class="bg-blue-600 py-3 rounded-xl font-bold">Save Changes</button>
                        <button onclick="deleteProduct('${key}')" class="bg-red-600/20 text-red-500 py-3 rounded-xl font-bold">Delete</button>
                    </div>
                </div>`;
            document.getElementById('orderModal').classList.add('active');
        }

        async function updateProduct(key) {
            const updates = {
                name: document.getElementById('eName').value,
                price: document.getElementById('ePrice').value,
                delivery: document.getElementById('eDel').value,
                cod_fee: document.getElementById('eCod').value,
                desc: document.getElementById('eDesc').value,
                video: document.getElementById('eVideo').value
            };
            await database.ref('products/' + key).update(updates);
            alert("Success!"); closeModal();
        }

        function deleteProduct(key) { if(confirm("Confirm Delete?")) { database.ref('products/' + key).remove(); closeModal(); } }

        database.ref('orders').on('value', (snapshot) => {
            const list = document.getElementById('orders-list');
            list.innerHTML = "";
            snapshot.forEach(child => {
                const o = child.val();
                const isAdvance = o.paymentMethod === 'advance';
                list.innerHTML += `<div class="glass-card p-5 border-l-4 ${isAdvance ? 'border-green-500' : 'border-yellow-500'}" onclick='openOrderDetails(${JSON.stringify(o)}, "${child.key}")'><div class="flex justify-between items-start"><div><h3 class="font-bold text-white">${o.customerName}</h3><p class="text-xs text-slate-400">${o.customerCity}</p></div><span class="text-[10px] text-slate-500">${o.date.split(',')[0]}</span></div><div class="mt-4 flex justify-between items-center font-bold text-sm"><span class="${isAdvance ? 'text-green-400' : 'text-yellow-400'} uppercase">${o.paymentMethod}</span><span class="text-blue-400">${o.price}</span></div></div>`;
            });
        });

        function openOrderDetails(o, key) {
            document.getElementById('modal-title').innerText = "Order Details";
            const content = document.getElementById('modal-content');
            const isAdvance = o.paymentMethod === 'advance';
            content.innerHTML = `<div class="space-y-4"><div class="bg-slate-800/50 p-4 rounded-2xl border border-white/5 text-sm"><p><b>Customer:</b> ${o.customerName}</p><p><b>Phone:</b> ${o.customerPhone}</p><p><b>Address:</b> ${o.customerAddress}, ${o.customerCity}</p></div><div class="bg-slate-800/50 p-4 rounded-2xl border border-white/5 text-sm"><p class="text-blue-400 font-bold mb-1">Total Bill: ${o.price}</p><p class="font-bold ${isAdvance ? 'text-green-500' : 'text-red-500'}">${isAdvance ? 'PAID - COLLECT 0 RS' : 'COLLECT: ' + o.price}</p></div>${o.screenshot && o.screenshot !== "No Screenshot (COD)" ? `<img src="${o.screenshot}" class="w-full rounded-2xl border border-slate-700">` : ''}<button onclick="deleteOrder('${key}')" class="w-full bg-red-600/20 text-red-500 py-3 rounded-xl font-bold">Delete Order</button></div>`;
            document.getElementById('orderModal').classList.add('active');
        }

        function deleteOrder(key) { if(confirm("Delete order?")) { database.ref('orders/' + key).remove(); closeModal(); } }

        async function uploadAll() {
            const btn = document.getElementById('uploadBtn');
            const fileInputs = document.querySelectorAll('.pImg');
            let uploadedUrls = [];
            btn.disabled = true; btn.innerHTML = '<div class="loader"></div>';
            try {
                for (let input of fileInputs) {
                    if (input.files[0]) {
                        const formData = new FormData();
                        formData.append("image", input.files[0]);
                        const res = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, { method: "POST", body: formData });
                        const d = await res.json();
                        uploadedUrls.push(d.data.url);
                    }
                }
                await database.ref('products').push({
                    name: document.getElementById('pName').value,
                    price: document.getElementById('pPrice').value,
                    delivery: document.getElementById('pDelivery').value,
                    cod_fee: document.getElementById('pCod').value,
                    desc: document.getElementById('pDesc').value,
                    video: document.getElementById('pVideo').value,
                    images: uploadedUrls,
                    date: new Date().toLocaleString()
                });
                alert("Success!"); location.reload();
            } catch (e) { alert("Error!"); btn.disabled = false; btn.innerText = "Upload Product"; }
        }
    </script>
</body>
</html>
