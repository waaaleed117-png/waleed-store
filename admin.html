<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waleed Store | Pro Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0a0f1c; color: #e2e8f0; }
        .sidebar { transition: 0.3s; width: 260px; background: #111827; height: 100vh; position: fixed; left: -260px; z-index: 100; }
        .sidebar.active { left: 0; }
        .main-content { transition: 0.3s; padding: 20px; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem; cursor: pointer; transition: 0.2s; }
        .glass-card:hover { transform: translateY(-3px); background: rgba(30, 41, 59, 0.9); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; backdrop-filter: blur(5px); align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden-section { display: none; }
    </style>
</head>
<body>

    <div id="sidebar" class="sidebar border-r border-slate-800 p-6">
        <div class="flex items-center justify-between mb-10">
            <span class="text-xl font-bold text-blue-500">Waleed Pro</span>
            <button onclick="toggleSidebar()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <nav class="space-y-4">
            <button onclick="showSection('add-product')" class="w-full text-left p-3 rounded-xl hover:bg-blue-600/10 hover:text-blue-400 transition flex items-center gap-3">
                <i class="fa-solid fa-plus-circle"></i> Add Product
            </button>
            <button onclick="showSection('manage-products')" class="w-full text-left p-3 rounded-xl hover:bg-blue-600/10 hover:text-blue-400 transition flex items-center gap-3">
                <i class="fa-solid fa-list-check"></i> Manage Products
            </button>
            <button onclick="showSection('view-orders')" class="w-full text-left p-3 rounded-xl hover:bg-blue-600/10 hover:text-blue-400 transition flex items-center gap-3">
                <i class="fa-solid fa-cart-shopping"></i> View Orders
            </button>
        </nav>
    </div>

    <div class="main-content">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="toggleSidebar()" class="text-2xl p-2 bg-slate-800 rounded-lg"><i class="fa-solid fa-bars-staggered"></i></button>
            <h1 id="page-title" class="text-2xl font-bold">Add Product</h1>
        </div>

        <div id="add-product" class="glass-card p-6 max-w-2xl mx-auto shadow-2xl cursor-default hover:transform-none">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <input type="text" id="pName" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl outline-none" placeholder="Product Name">
                <input type="number" id="pPrice" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl outline-none" placeholder="Price">
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <input type="number" id="pDelivery" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl outline-none" placeholder="Delivery Charges" value="200">
                <input type="number" id="pCod" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl outline-none" placeholder="COD Fee" value="0">
            </div>
            <textarea id="pDesc" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl h-24 mb-4 outline-none" placeholder="Description"></textarea>
            <button id="uploadBtn" onclick="uploadAll()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold">Upload Product</button>
        </div>

        <div id="manage-products" class="hidden-section">
            <div id="admin-product-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <div id="view-orders" class="hidden-section">
            <div id="orders-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>
    </div>

    <div id="orderModal" class="modal">
        <div class="bg-slate-900 w-full max-w-md rounded-3xl p-6 border border-slate-700 max-h-[90vh] overflow-y-auto relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-400 text-xl"><i class="fa-solid fa-circle-xmark"></i></button>
            <h2 id="modal-title" class="text-xl font-bold text-blue-400 mb-6">Details</h2>
            <div id="modal-content" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBYrmozXYLHxCmLsc8FX6aN6xSvORxXypo",
            authDomain: "waleed-store-f7369.firebaseapp.com",
            databaseURL: "https://waleed-store-f7369-default-rtdb.firebaseio.com/",
            projectId: "waleed-store-f7369",
            storageBucket: "waleed-store-f7369.appspot.com",
            messagingSenderId: "148677610444",
            appId: "1:148677610444:web:2a838575003504f216503c"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function closeModal() { document.getElementById('orderModal').classList.remove('active'); }

        function showSection(id) {
            document.querySelectorAll('.main-content > div:not(.flex)').forEach(div => div.classList.add('hidden-section'));
            document.getElementById(id).classList.remove('hidden-section');
            const titles = {'add-product': 'Add Product', 'view-orders': 'Customer Orders', 'manage-products': 'Manage Store'};
            document.getElementById('page-title').innerText = titles[id];
            if(window.innerWidth < 768) toggleSidebar();
        }

        // --- MANAGE PRODUCTS LOGIC ---
        database.ref('products').on('value', (snapshot) => {
            const adminList = document.getElementById('admin-product-list');
            adminList.innerHTML = "";
            snapshot.forEach(child => {
                const p = child.val();
                adminList.innerHTML += `
                    <div class="glass-card p-4 border-l-4 border-blue-500 flex justify-between items-center" onclick='openEditProduct(${JSON.stringify(p)}, "${child.key}")'>
                        <div class="truncate">
                            <h3 class="font-bold text-sm text-white truncate">${p.name}</h3>
                            <p class="text-xs text-slate-400">Rs. ${p.price}</p>
                        </div>
                        <i class="fa-solid fa-pen-to-square text-blue-400"></i>
                    </div>`;
            });
        });

        function openEditProduct(p, key) {
            document.getElementById('modal-title').innerText = "Edit Product";
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <div class="space-y-3">
                    <input type="text" id="editName" value="${p.name}" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 outline-none">
                    <input type="number" id="editPrice" value="${p.price}" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 outline-none">
                    <input type="number" id="editDel" value="${p.delivery || 200}" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 outline-none">
                    <input type="number" id="editCod" value="${p.cod_fee || 0}" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 outline-none">
                    <textarea id="editDesc" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 outline-none h-24">${p.desc}</textarea>
                    <div class="grid grid-cols-2 gap-2 mt-4">
                        <button onclick="updateProduct('${key}')" class="bg-blue-600 py-3 rounded-xl font-bold">Save Changes</button>
                        <button onclick="deleteProduct('${key}')" class="bg-red-600/20 text-red-500 py-3 rounded-xl font-bold">Delete</button>
                    </div>
                </div>
            `;
            document.getElementById('orderModal').classList.add('active');
        }

        async function updateProduct(key) {
            const updates = {
                name: document.getElementById('editName').value,
                price: document.getElementById('editPrice').value,
                delivery: document.getElementById('editDel').value,
                cod_fee: document.getElementById('editCod').value,
                desc: document.getElementById('editDesc').value
            };
            await database.ref('products/' + key).update(updates);
            alert("Product Updated!");
            closeModal();
        }

        function deleteProduct(key) {
            if(confirm("Hamesha ke liye delete kar dein?")) {
                database.ref('products/' + key).remove();
                closeModal();
            }
        }

        // --- FETCH ORDERS ---
        database.ref('orders').on('value', (snapshot) => {
            const list = document.getElementById('orders-list');
            list.innerHTML = "";
            snapshot.forEach(child => {
                const o = child.val();
                const isAdvance = o.paymentMethod === 'advance';
                list.innerHTML += `
                    <div class="glass-card p-5 border-l-4 ${isAdvance ? 'border-green-500' : 'border-yellow-500'}" onclick='openOrderDetails(${JSON.stringify(o)}, "${child.key}")'>
                        <div class="flex justify-between items-start">
                            <div><h3 class="font-bold text-lg text-white">${o.customerName}</h3><p class="text-xs text-slate-400">${o.customerCity}</p></div>
                            <span class="text-[10px] bg-slate-800 px-2 py-1 rounded text-slate-500">${o.date.split(',')[0]}</span>
                        </div>
                        <div class="mt-4 flex justify-between items-center"><span class="text-[10px] font-bold uppercase ${isAdvance ? 'text-green-400' : 'text-yellow-400'}">${o.paymentMethod}</span><span class="text-blue-400 font-bold">${o.price}</span></div>
                    </div>`;
            });
        });

        function openOrderDetails(o, key) {
            document.getElementById('modal-title').innerText = "Order Details";
            const content = document.getElementById('modal-content');
            const isAdvance = o.paymentMethod === 'advance';
            content.innerHTML = `
                <div class="space-y-4">
                    <div class="bg-slate-800/50 p-4 rounded-2xl border border-white/5 text-sm">
                        <p><b>Name:</b> ${o.customerName}</p><p><b>Phone:</b> ${o.customerPhone}</p><p><b>City:</b> ${o.customerCity}</p><p><b>Address:</b> ${o.customerAddress}</p>
                    </div>
                    <div class="bg-slate-800/50 p-4 rounded-2xl border border-white/5">
                        <p class="text-xs"><b>Products:</b> ${o.productName}</p>
                        <p class="text-sm mt-2 text-blue-400 font-bold">Total: ${o.price}</p>
                        <p class="text-xs font-bold mt-2 ${isAdvance ? 'text-green-500' : 'text-red-500'}">${isAdvance ? 'PAID: Rs. 0 DUE' : 'COLLECT: ' + o.price}</p>
                    </div>
                    ${o.screenshot && o.screenshot !== "No Screenshot (COD)" ? `<a href="${o.screenshot}" target="_blank"><img src="${o.screenshot}" class="w-full rounded-2xl border border-slate-700 shadow-xl"></a>` : ''}
                    <button onclick="deleteOrder('${key}')" class="w-full bg-red-600/20 text-red-500 py-3 rounded-xl font-bold">Delete Order</button>
                </div>`;
            document.getElementById('orderModal').classList.add('active');
        }

        function deleteOrder(key) { if(confirm("Delete order?")) { database.ref('orders/' + key).remove(); closeModal(); } }

        async function uploadAll() {
            const btn = document.getElementById('uploadBtn');
            const data = {
                name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value,
                delivery: document.getElementById('pDelivery').value,
                cod_fee: document.getElementById('pCod').value,
                desc: document.getElementById('pDesc').value,
                date: new Date().toLocaleString()
            };
            if(!data.name || !data.price) return alert("Details missing!");
            btn.disabled = true; btn.innerHTML = '<div class="loader"></div>';
            await database.ref('products').push(data);
            alert("Uploaded!"); location.reload();
        }
    </script>
</body>
</html>
