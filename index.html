<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waleed Store | Premium Quality</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        
        .glass { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        .hero-bg { background: radial-gradient(circle at top right, #1e3a8a, #020617); }
        
        /* Always-on Floating WhatsApp */
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .fixed-wa { 
            position: fixed; bottom: 20px; right: 15px; z-index: 9999; 
            background-color: #25D366; color: white; width: 55px; height: 55px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3);
            animation: floating 3s ease-in-out infinite;
        }

        /* Always-on Pulse for Order Button */
        @keyframes pulse-ring {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.7); }
            70% { transform: scale(1.03); box-shadow: 0 0 0 10px rgba(37, 99, 235, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
        }
        .animate-order { animation: pulse-ring 2s infinite; }

        .premium-text {
            background: linear-gradient(to right, #60a5fa, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .btn-hover:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-white">

    <a href="https://wa.me/923704884772" target="_blank" class="fixed-wa">
        <i class="fa-brands fa-whatsapp text-2xl"></i>
    </a>

    <nav class="glass fixed w-full top-0 z-50 px-4 py-2 border-b border-slate-100">
        <div class="container mx-auto flex justify-between items-center">
            <a href="#" class="flex items-center space-x-1">
                <span class="text-xl font-extrabold text-slate-900">Waleed</span>
                <span class="text-xl font-extrabold text-blue-600">Store</span>
            </a>
            <div class="relative cursor-pointer btn-hover p-1">
                <i class="fa-solid fa-cart-shopping text-xl text-slate-800"></i>
                <span class="absolute -top-1 -right-1 bg-blue-600 text-white text-[9px] px-1.5 rounded-full border border-white font-bold">0</span>
            </div>
        </div>
    </nav>

    <header class="hero-bg pt-32 pb-20 text-white relative">
        <div class="container mx-auto px-6 text-center">
            <div data-aos="fade-down" data-aos-duration="1000">
                <h1 class="text-3xl md:text-5xl mb-3 tracking-tight">
                    <span class="premium-text">Premium Quality</span>
                </h1>
            </div>
            <p class="text-slate-300 text-sm mb-8 max-w-xs mx-auto" data-aos="fade-up" data-aos-delay="200" data-aos-duration="1000">
                Your trust is our priority. Choose your favorite product and order now.
            </p>
            <div data-aos="zoom-in" data-aos-delay="400" data-aos-duration="800">
                <a href="#products" class="animate-order bg-blue-600 text-white px-8 py-3.5 rounded-xl font-bold text-md shadow-xl inline-block btn-hover uppercase tracking-wider">
                    Order Now
                </a>
            </div>
        </div>
    </header>

    <section id="products" class="py-16 px-4">
        <div class="text-center mb-10" data-aos="fade-up" data-aos-duration="1000">
            <h2 class="text-2xl font-bold text-slate-800">New Products</h2>
            <div class="h-1 w-10 bg-blue-600 mx-auto mt-2 rounded-full"></div>
        </div>
        
        <div class="grid grid-cols-2 gap-4 container mx-auto">
            <div class="bg-slate-50 rounded-2xl p-3 border border-slate-100 shadow-sm" data-aos="fade-right" data-aos-duration="1000">
                <div class="bg-white aspect-square rounded-xl mb-3 flex items-center justify-center shadow-inner">
                    <i class="fa-solid fa-bag-shopping text-slate-200 text-4xl"></i>
                </div>
                <h3 class="font-bold text-sm text-slate-800 truncate">Premium Item</h3>
                <p class="text-[10px] text-slate-500 mb-3">Quality guaranteed.</p>
                <div class="flex justify-between items-center">
                    <span class="text-sm font-extrabold text-slate-900">Rs. 4,500</span>
                    <button class="bg-blue-600 text-white w-8 h-8 rounded-lg flex items-center justify-center btn-hover">
                        <i class="fa-solid fa-plus text-xs"></i>
                    </button>
                </div>
            </div>
            <div class="bg-slate-50 rounded-2xl p-3 border border-slate-100 shadow-sm" data-aos="fade-left" data-aos-delay="100" data-aos-duration="1000">
                <div class="bg-white aspect-square rounded-xl mb-3 flex items-center justify-center shadow-inner">
                    <i class="fa-solid fa-star text-slate-200 text-4xl"></i>
                </div>
                <h3 class="font-bold text-sm text-slate-800 truncate">Luxury Essential</h3>
                <p class="text-[10px] text-slate-500 mb-3">Exclusive design.</p>
                <div class="flex justify-between items-center">
                    <span class="text-sm font-extrabold text-slate-900">Rs. 5,200</span>
                    <button class="bg-blue-600 text-white w-8 h-8 rounded-lg flex items-center justify-center btn-hover">
                        <i class="fa-solid fa-plus text-xs"></i>
                    </button>
                </div>
            </div>
        </div>
    </section>

    <section id="contact" class="py-16 px-6 bg-slate-900 text-white rounded-t-[3rem]">
        <div class="container mx-auto">
            <div class="text-center mb-10" data-aos="fade-down" data-aos-duration="1000">
                <h2 class="text-2xl font-bold">Contact us</h2>
            </div>
            <div class="space-y-4 mb-12" data-aos="zoom-in" data-aos-duration="1000">
                <div class="bg-white/5 p-6 rounded-2xl border border-white/10">
                    <div class="mb-4">
                        <label class="text-[10px] font-bold text-blue-400 uppercase tracking-widest mb-1 block">Full Name</label>
                        <input type="text" id="userName" placeholder="Your Name" class="w-full bg-transparent border-b border-white/20 py-2 outline-none focus:border-blue-500 transition text-md text-white">
                    </div>
                    <div class="mb-6">
                        <label class="text-[10px] font-bold text-blue-400 uppercase tracking-widest mb-1 block">Message</label>
                        <textarea id="userMsg" placeholder="Type here..." class="w-full bg-transparent border-b border-white/20 py-2 outline-none focus:border-blue-500 transition h-20 text-md text-white"></textarea>
                    </div>
                    <button onclick="sendWhatsApp()" class="w-full bg-blue-600 py-4 rounded-xl font-bold text-sm uppercase tracking-widest btn-hover shadow-lg">
                        Send to WhatsApp
                    </button>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-8 text-center text-slate-500 text-[9px] bg-slate-900 tracking-widest uppercase border-t border-white/5">
        &copy; 2026 Waleed Store. Professional Premium Quality.
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // AOS Initialize with smooth scroll settings
        AOS.init({
            duration: 1000,
            once: false, // Makes animations repeat on scroll up/down
            mirror: true,
            offset: 50
        });

        function sendWhatsApp() {
            const name = document.getElementById('userName').value;
            const msg = document.getElementById('userMsg').value;
            if(!name || !msg) { alert("Fill all details!"); return; }
            const finalMsg = encodeURIComponent(`*Inquiry*\n*Name:* ${name}\n*Message:* ${msg}`);
            window.open(`https://wa.me/923704884772?text=${finalMsg}`, '_blank');
        }
    </script>
</body>
</html>
