<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waleed Store | Premium Quality</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
        body { font-family: 'Poppins', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .hero-bg { background: linear-gradient(135deg, #020617 0%, #1e3a8a 100%); }
        
        /* Fixed Floating WhatsApp */
        .fixed-wa { 
            position: fixed; bottom: 25px; right: 20px; z-index: 9999; 
            background-color: #25D366; color: white; width: 60px; height: 60px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.4); transition: 0.3s;
        }
        .fixed-wa:hover { transform: scale(1.1); }

        /* Pulse for Order Button */
        @keyframes pulse-custom {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(37, 99, 235, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
        }
        .pulse-btn { animation: pulse-custom 2s infinite; }
        .btn-hover:active { transform: scale(0.9); }
    </style>
</head>
<body class="bg-white">

    <a href="https://wa.me/923704884772" target="_blank" class="fixed-wa">
        <i class="fa-brands fa-whatsapp text-3xl"></i>
    </a>

    <nav class="glass fixed w-full top-0 z-50 px-6 py-3 border-b border-slate-100">
        <div class="container mx-auto flex justify-between items-center">
            <a href="#" class="flex flex-col items-center leading-none">
                <span class="text-2xl font-black tracking-tighter text-slate-900 uppercase">Waleed</span>
                <span class="text-2xl font-black tracking-tighter text-blue-600 uppercase">Store</span>
            </a>
            
            <div class="relative cursor-pointer btn-hover p-2">
                <i class="fa-solid fa-cart-shopping text-2xl text-slate-800"></i>
                <span class="absolute top-0 right-0 bg-blue-600 text-white text-[10px] px-1.5 rounded-full border-2 border-white font-bold">0</span>
            </div>
        </div>
    </nav>

    <header class="hero-bg pt-48 pb-32 text-white relative">
        <div class="container mx-auto px-6 text-center">
            <div data-aos="zoom-in" data-aos-duration="1000">
                <h1 class="text-6xl font-black leading-tight mb-4 uppercase italic tracking-tighter">
                    PREMIUM<br><span class="text-blue-400">QUALITY</span>
                </h1>
            </div>
            
            <p class="text-slate-200 text-lg mb-10 max-w-sm mx-auto leading-snug" data-aos="fade-up" data-aos-delay="300">
                Your trust is our priority. Choose your favorite product and order now.
            </p>
            
            <div data-aos="fade-up" data-aos-delay="500">
                <a href="#products" class="pulse-btn bg-blue-600 text-white px-12 py-5 rounded-2xl font-black text-xl shadow-2xl inline-block btn-hover uppercase tracking-widest">
                    Order Now
                </a>
            </div>
        </div>
    </header>

    <section id="products" class="py-24 px-6">
        <div class="text-center mb-16" data-aos="fade-up">
            <h2 class="text-4xl font-black uppercase tracking-tighter italic">New Products</h2>
            <div class="h-1.5 w-16 bg-blue-600 mx-auto mt-2"></div>
        </div>
        
        <div class="grid grid-cols-1 gap-12 max-w-md mx-auto">
            <div class="bg-slate-50 rounded-[3rem] p-8 border border-slate-100 shadow-sm" data-aos="fade-up">
                <div class="bg-white h-72 rounded-[2rem] mb-6 flex items-center justify-center shadow-inner">
                    <i class="fa-solid fa-bag-shopping text-slate-100 text-9xl"></i>
                </div>
                <h3 class="font-black text-2xl mb-2 uppercase italic">Premium Item</h3>
                <p class="text-slate-500 mb-6 italic">Top quality guaranteed.</p>
                <div class="flex justify-between items-center">
                    <span class="text-3xl font-black text-slate-900">Rs. 4,500</span>
                    <button class="bg-blue-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center btn-hover shadow-lg">
                        <i class="fa-solid fa-plus text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
    </section>

    <section id="contact" class="py-24 px-6 bg-slate-900 text-white rounded-t-[4rem]">
        <div class="container mx-auto">
            <div class="text-center mb-12" data-aos="fade-down">
                <h2 class="text-4xl font-black uppercase italic text-blue-400">Contact Us</h2>
            </div>

            <div class="space-y-6 mb-16" data-aos="zoom-in">
                <div class="bg-white/5 p-8 rounded-[2rem] border border-white/10">
                    <div class="mb-6">
                        <label class="text-xs font-bold text-blue-400 uppercase tracking-widest mb-2 block font-bold">Full Name</label>
                        <input type="text" id="userName" placeholder="Your Name" class="w-full bg-transparent border-b-2 border-white/20 p-3 outline-none focus:border-blue-500 transition text-lg text-white">
                    </div>
                    <div class="mb-8">
                        <label class="text-xs font-bold text-blue-400 uppercase tracking-widest mb-2 block font-bold">Message</label>
                        <textarea id="userMsg" placeholder="Type message..." class="w-full bg-transparent border-b-2 border-white/20 p-3 outline-none focus:border-blue-500 transition h-24 text-white"></textarea>
                    </div>
                    <button onclick="sendWhatsApp()" class="w-full bg-blue-600 py-5 rounded-2xl font-black text-lg uppercase tracking-widest btn-hover shadow-xl">
                        Send to WhatsApp
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-10 text-center" data-aos="fade-up">
                <div>
                    <i class="fa-solid fa-map-location-dot text-blue-500 text-3xl mb-3"></i>
                    <p class="text-lg font-bold">Punjab, Pakistan</p>
                </div>
                <div>
                    <i class="fa-brands fa-whatsapp text-green-500 text-3xl mb-3"></i>
                    <p class="text-lg font-bold">+92 370 4884772</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-12 text-center text-slate-600 text-[10px] bg-slate-900 tracking-[0.3em] uppercase">
        &copy; 2026 WALEED STORE.
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: false, mirror: true });

        function sendWhatsApp() {
            const name = document.getElementById('userName').value;
            const msg = document.getElementById('userMsg').value;
            if(!name || !msg) { alert("Fill all details!"); return; }
            const finalMsg = encodeURIComponent(`*Store Inquiry*\n\n*Name:* ${name}\n*Message:* ${msg}`);
            window.open(`https://wa.me/923704884772?text=${finalMsg}`, '_blank');
        }
    </script>
</body>
</html>
