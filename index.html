<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waleed Store | Professional Premium</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        html, body { max-width: 100%; overflow-x: hidden; font-family: 'Inter', sans-serif; scroll-behavior: smooth; background-color: #f8fafc; color: #1e293b; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        
        /* SLIDER BACKGROUND BLUE */
        .hero-bg { background: radial-gradient(circle at top right, #1e3a8a, #020617); border-radius: 0 0 2.5rem 2.5rem; }

        /* FIXED SLIDER: Ab Image Puri Nazar Aaye Gi */
        .slider-container { width: 100%; overflow: hidden; position: relative; border-radius: 1.2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.2); aspect-ratio: 16/9; background: #020617; }
        .slider-wrapper { display: flex; transition: transform 0.6s cubic-bezier(0.45, 0, 0.55, 1); height: 100%; }
        .slider-img { min-width: 100%; width: 100%; height: 100%; object-fit: contain; background: #020617; }

        /* Trust Badges */
        .badge-box { background: white; padding: 12px 6px; border-radius: 1.2rem; border: 1px solid #e2e8f0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .badge-box i { font-size: 1.1rem; margin-bottom: 5px; color: #2563eb; }
        .badge-box span { font-size: 8px; font-weight: 700; color: #475569; text-transform: uppercase; }

        /* Premium Product Cards */
        .product-card { background: white; border-radius: 1.5rem; border: 1px solid #f1f5f9; transition: all 0.3s ease; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.01); display: flex; flex-direction: column; justify-content: space-between; overflow: hidden;}
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.08); }
        
        /* Blue Add to Cart Button */
        .add-to-cart-btn { background: linear-gradient(to right, #1e40af, #2563eb); color: #fff; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; border-radius: 0.8rem; padding: 12px; width: 100%; text-align: center; margin-top: 10px; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .add-to-cart-btn:active { transform: scale(0.98); }

        .fixed-wa { position: fixed; bottom: 20px; right: 15px; z-index: 9999; background-color: #25D366; color: white; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(37,211,102,0.3); animation: floating 3s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <a href="https://wa.me/923704884772" target="_blank" class="fixed-wa">
        <i class="fa-brands fa-whatsapp text-2xl"></i>
    </a>

    <nav class="glass fixed w-full top-0 z-50 px-4 py-3 border-b border-slate-100">
        <div class="container mx-auto flex justify-between items-center">
            <a href="#" class="flex items-center space-x-1">
                <span class="text-xl font-extrabold text-slate-900 uppercase tracking-tighter">Waleed</span>
                <span class="text-xl font-extrabold text-blue-600 uppercase tracking-tighter">Store</span>
            </a>
            <div class="relative p-1 cursor-pointer" onclick="window.location.href='checkout.html'">
                <i class="fa-solid fa-cart-shopping text-xl text-slate-800"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-blue-600 text-white text-[9px] px-1.5 rounded-full border border-white font-bold">0</span>
            </div>
        </div>
    </nav>

    <header class="hero-bg pt-28 pb-12 px-4">
        <div class="slider-container" data-aos="zoom-in">
            <div id="sliderWrapper" class="slider-wrapper">
                <img src="https://placehold.co/800x450?text=Loading+Banners..." class="slider-img">
            </div>
        </div>
    </header>

    <div class="grid grid-cols-3 gap-3 px-4 mb-8 -mt-6" data-aos="fade-up">
        <div class="badge-box shadow-sm">
            <i class="fa-solid fa-truck-fast"></i>
            <span>Fast Shipping</span>
        </div>
        <div class="badge-box shadow-sm">
            <i class="fa-solid fa-certificate"></i>
            <span>100% Original</span>
        </div>
        <div class="badge-box shadow-sm">
            <i class="fa-solid fa-headset"></i>
            <span>24/7 Support</span>
        </div>
    </div>

    <section id="products" class="px-4 pb-12">
        <div class="flex justify-between items-end mb-6">
            <div>
                <h2 class="text-xl font-extrabold text-slate-800">Trending Now</h2>
                <div class="h-1 w-8 bg-blue-600 rounded-full"></div>
            </div>
            <span class="text-xs font-bold text-blue-600">See All</span>
        </div>
        
        <div id="product-grid" class="grid grid-cols-2 gap-4">
            </div>
    </section>

    <section id="contact" class="py-16 px-6 bg-slate-900 text-white rounded-t-[3rem]">
        <div class="container mx-auto">
            <h2 class="text-2xl font-bold text-center mb-8">Customer Support</h2>
            <div class="bg-white/5 p-6 rounded-2xl border border-white/10 mb-10 text-center">
                <p class="text-xs text-slate-400 mb-6 uppercase tracking-widest">Available 24/7 for your help</p>
                <button onclick="window.open('https://wa.me/923704884772')" class="w-full bg-blue-600 py-4 rounded-xl font-bold text-xs uppercase tracking-widest active:scale-95 transition">Chat on WhatsApp</button>
            </div>
        </div>
    </section>

    <footer class="py-8 text-center text-slate-500 text-[10px] bg-slate-900 tracking-widest uppercase border-t border-white/5">
        © 2026 WALEED STORE | PREMIUM EXPERIENCE
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBYrmozXYLHxCmLsc8FX6aN6xSvORxXypo",
            authDomain: "waleed-store-f7369.firebaseapp.com",
            databaseURL: "https://waleed-store-f7369-default-rtdb.firebaseio.com/",
            projectId: "waleed-store-f7369",
            storageBucket: "waleed-store-f7369.firebasestorage.app",
            messagingSenderId: "766742927418",
            appId: "1:766742927418:web:310f0cb6afd311a4a93d03"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // --- SLIDER LOGIC ---
        let currentSlide = 0;
        database.ref('slider').on('value', (snapshot) => {
            const wrapper = document.getElementById('sliderWrapper');
            wrapper.innerHTML = "";
            let images = [];
            snapshot.forEach(child => {
                images.push(child.val().url);
                wrapper.innerHTML += `<img src="${child.val().url}" class="slider-img">`;
            });
            
            if(images.length > 1) {
                setInterval(() => {
                    currentSlide = (currentSlide + 1) % images.length;
                    wrapper.style.transform = `translateX(-${currentSlide * 100}%)`;
                }, 5000); 
            }
        });

        // --- PRODUCT GRID LOGIC ---
        database.ref('products').on('value', (snapshot) => {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            snapshot.forEach((child) => {
                const p = child.val();
                const id = child.key;
                const imagesArray = p.images || [p.image];
                const firstImg = imagesArray[0] || 'https://placehold.co/400x400';

                grid.innerHTML += `
                    <div class="product-card" data-aos="fade-up">
                        <div onclick="window.location.href='product.html?id=${id}'" class="aspect-square relative overflow-hidden m-2 rounded-xl bg-slate-50">
                            <img src="${firstImg}" class="w-full h-full object-cover">
                        </div>
                        <div class="px-3 pb-3">
                            <h3 class="font-bold text-[11px] text-slate-900 truncate mb-1">${p.name}</h3>
                            <div class="flex flex-col gap-0.5 mb-2">
                                <span class="text-[10px] font-medium text-slate-400 line-through">Rs. ${parseInt(p.price) + 800}</span>
                                <span class="text-sm font-extrabold text-blue-700">Rs. ${p.price}</span>
                            </div>
                            <button onclick="window.location.href='product.html?id=${id}'" class="add-to-cart-btn">Add To Cart</button>
                        </div>
                    </div>`;
            });
        });

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            document.getElementById('cart-count').innerText = cart.length;
        }

        window.addEventListener('pageshow', updateCartCount);
        updateCartCount();

        AOS.init({ duration: 800, once: true });
    </script>
</body>
</html>
