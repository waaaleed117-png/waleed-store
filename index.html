<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waleed Store | Premium Quality</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        html, body { max-width: 100%; overflow-x: hidden; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        .hero-bg { background: radial-gradient(circle at top right, #1e3a8a, #020617); }
        .fixed-wa { position: fixed; bottom: 20px; right: 15px; z-index: 9999; background-color: #25D366; color: white; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(37,211,102,0.3); animation: floating 3s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .animate-order { animation: pulse-ring 2s infinite !important; }
        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(37, 99, 235, 0); } 100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); } }
        .premium-text { background: linear-gradient(to right, #60a5fa, #c084fc, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .video-container { position: relative; padding-bottom: 100%; height: 0; overflow: hidden; border-radius: 0.75rem; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        /* Naya scale effect */
        .product-card { transition: transform 0.2s; }
        .product-card:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-white">

    <a href="https://wa.me/923704884772" target="_blank" class="fixed-wa">
        <i class="fa-brands fa-whatsapp text-2xl"></i>
    </a>

    <nav class="glass fixed w-full top-0 z-50 px-4 py-2 border-b border-slate-100">
        <div class="container mx-auto flex justify-between items-center">
            <a href="#" class="flex items-center space-x-1">
                <span class="text-xl font-extrabold text-slate-900">Waleed</span>
                <span class="text-xl font-extrabold text-blue-600">Store</span>
            </a>
            <div class="relative p-1">
                <i class="fa-solid fa-cart-shopping text-xl text-slate-800"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-blue-600 text-white text-[9px] px-1.5 rounded-full border border-white font-bold">0</span>
            </div>
        </div>
    </nav>

    <header class="hero-bg pt-32 pb-20 text-white text-center px-6">
        <div data-aos="fade-down">
            <h1 class="text-4xl font-extrabold mb-3"><span class="premium-text">Premium Quality</span></h1>
        </div>
        <p class="text-slate-300 text-sm mb-8 max-w-xs mx-auto">Your trust is our priority. Choose your favorite product and order now.</p>
        <a href="#products" class="animate-order bg-blue-600 text-white px-10 py-4 rounded-xl font-bold text-md inline-block uppercase shadow-lg">Order Now</a>
    </header>

    <section id="products" class="py-12 px-4">
        <div class="text-center mb-10">
            <h2 class="text-2xl font-bold text-slate-800">New Products</h2>
            <div class="h-1 w-10 bg-blue-600 mx-auto mt-2 rounded-full"></div>
        </div>
        <div id="product-grid" class="grid grid-cols-2 gap-4">
            <p class="text-center col-span-2 text-slate-400">Loading products...</p>
        </div>
    </section>

    <section id="contact" class="py-16 px-6 bg-slate-900 text-white rounded-t-[3rem]">
        <div class="container mx-auto">
            <h2 class="text-2xl font-bold text-center mb-8">Contact us</h2>
            <div class="bg-white/5 p-6 rounded-2xl border border-white/10 mb-10">
                <input type="text" id="userName" placeholder="Your Full Name" class="w-full bg-transparent border-b border-white/20 py-2 outline-none text-white text-sm mb-4">
                <textarea id="userMsg" placeholder="Type your order details here..." class="w-full bg-transparent border-b border-white/20 py-2 outline-none h-16 text-white text-sm mb-6"></textarea>
                <button onclick="sendOrder()" class="w-full bg-blue-600 py-4 rounded-xl font-bold text-xs uppercase tracking-widest active:scale-95 transition">Send to WhatsApp</button>
            </div>
            <div class="grid grid-cols-1 gap-8 text-center">
                <div>
                    <i class="fa-solid fa-location-dot text-blue-500 text-xl mb-2"></i>
                    <h4 class="text-xs font-bold text-blue-400 uppercase">Location</h4>
                    <p class="text-sm opacity-80">Punjab, Pakistan</p>
                </div>
                <div>
                    <i class="fa-brands fa-whatsapp text-green-500 text-xl mb-2"></i>
                    <h4 class="text-xs font-bold text-green-400 uppercase">WhatsApp</h4>
                    <p class="text-sm opacity-80">+92 370 4884772</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-8 text-center text-slate-500 text-[9px] bg-slate-900 tracking-widest uppercase border-t border-white/5">
        © 2026 WALEED STORE. PROFESSIONAL PREMIUM QUALITY.
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // AAPKA PURANA FIREBASE CONFIG (CHANGE NAHI KIYA)
        const firebaseConfig = {
            apiKey: "AIzaSyBYrmozXYLHxCmLsc8FX6aN6xSvORxXypo",
            authDomain: "waleed-store-f7369.firebaseapp.com",
            projectId: "waleed-store-f7369",
            storageBucket: "waleed-store-f7369.firebasestorage.app",
            messagingSenderId: "766742927418",
            appId: "1:766742927418:web:310f0cb6afd311a4a93d03"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function getYoutubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // --- LOAD PRODUCTS WITH CLICK TO DETAIL LOGIC ---
        database.ref('products').on('value', (snapshot) => {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            snapshot.forEach((child) => {
                const p = child.val();
                const id = child.key; // Product ki ID
                
                const imagesArray = p.images || [p.image];
                let mediaHtml = '';
                const vidId = p.video ? getYoutubeId(p.video) : null;

                if(vidId) {
                    mediaHtml = `<div class="video-container mb-3"><iframe src="https://www.youtube.com/embed/${vidId}" frameborder="0" allowfullscreen></iframe></div>`;
                } else {
                    mediaHtml = `<div class="flex overflow-x-auto snap-x snap-mandatory no-scrollbar space-x-2 mb-3 rounded-xl">`;
                    imagesArray.forEach(url => {
                        mediaHtml += `<img src="${url}" class="snap-center min-w-full aspect-square object-cover rounded-xl" onerror="this.src='https://placehold.co/400x400?text=Product'">`;
                    });
                    mediaHtml += `</div>`;
                }

                // Card par onclick lagaya taake Detail Page khule
                grid.innerHTML += `
                    <div class="product-card bg-slate-50 rounded-2xl p-3 border border-slate-100 shadow-sm cursor-pointer" 
                         onclick="window.location.href='product.html?id=${id}'" 
                         data-aos="fade-up">
                        ${mediaHtml}
                        <h3 class="font-bold text-[10px] text-slate-800 truncate">${p.name}</h3>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-[10px] font-bold text-blue-600">Rs. ${p.price}</span>
                            <div class="bg-blue-600 text-white w-7 h-7 rounded-lg text-xs flex items-center justify-center">
                                <i class="fa-solid fa-eye text-[8px]"></i>
                            </div>
                        </div>
                    </div>`;
            });
        });

        let selectedProduct = "None";
        let selectedPrice = "0";

        function sendOrder() {
            const name = document.getElementById('userName').value;
            const msg = document.getElementById('userMsg').value;
            if(!name || !msg) { alert("Please enter name and message"); return; }

            database.ref('orders').push({
                customerName: name,
                productName: selectedProduct,
                price: selectedPrice,
                message: msg,
                date: new Date().toLocaleString()
            }).then(() => {
                window.open(`https://wa.me/923704884772?text=Order Details:%0AName: ${name}%0AMessage: ${msg}`, '_blank');
            });
        }

        AOS.init({ duration: 1000, once: true });
    </script>
</body>
</html>
