<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waleed Store | Premium Quality</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        html, body { max-width: 100%; overflow-x: hidden; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        .hero-bg { background: radial-gradient(circle at top right, #1e3a8a, #020617); }
        .fixed-wa { position: fixed; bottom: 20px; right: 15px; z-index: 9999; background-color: #25D366; color: white; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(37,211,102,0.3); animation: floating 3s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        
        /* IMPROVED SLIDER STYLES */
        .slider-container { width: 100%; overflow: hidden; position: relative; border-radius: 1.5rem; box-shadow: 0 20px 40px rgba(0,0,0,0.4); aspect-ratio: 1/1; background: transparent; touch-action: pan-y; }
        .slider-wrapper { display: flex; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; will-change: transform; }
        .slider-img { min-width: 100%; width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* DOTS STYLING */
        .dots-container { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: all 0.3s ease; cursor: pointer; }
        .dot.active { background: #3b82f6; width: 20px; border-radius: 10px; }

        .badge-box { background: white; padding: 12px 2px; border-radius: 1rem; border: 1px solid #f1f5f9; display: flex; flex-direction: column; align-items: center; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .badge-box i { font-size: 1.3rem; margin-bottom: 4px; color: #2563eb; } 
        .badge-box h4 { font-size: 9px; font-weight: 800; color: #0f172a; margin-bottom: 1px; text-transform: uppercase; }
        .badge-box span { font-size: 7px; font-weight: 700; color: #64748b; text-transform: uppercase; }

        .product-card { background: white; border-radius: 1.2rem; border: 1px solid #f1f5f9; transition: all 0.3s ease; overflow: hidden; display: flex; flex-direction: column; }
        .add-to-cart-btn { background: #1e3a8a; color: white; width: 100%; padding: 10px; border-radius: 0.8rem; font-size: 10px; font-weight: 700; text-transform: uppercase; margin-top: 8px; cursor: pointer; }
        
        .premium-text { background: linear-gradient(to right, #60a5fa, #c084fc, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
    </style>
</head>
<body class="bg-white">

    <a href="https://wa.me/923704884772" target="_blank" class="fixed-wa">
        <i class="fa-brands fa-whatsapp text-2xl"></i>
    </a>

    <nav class="glass fixed w-full top-0 z-50 px-4 py-2 border-b border-slate-100">
        <div class="container mx-auto flex justify-between items-center">
            <a href="#" class="flex items-center space-x-1">
                <span class="text-xl font-extrabold text-slate-900">Waleed</span>
                <span class="text-xl font-extrabold text-blue-600">Store</span>
            </a>
            <div class="relative p-1 cursor-pointer" onclick="window.location.href='checkout.html'">
                <i class="fa-solid fa-cart-shopping text-xl text-slate-800"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-blue-600 text-white text-[9px] px-1.5 rounded-full border border-white font-bold">0</span>
            </div>
        </div>
    </nav>

    <header class="hero-bg pt-24 pb-16 text-white text-center px-4">
        <div data-aos="fade-down" class="mb-6">
            <h1 class="text-3xl font-extrabold mb-2"><span class="premium-text">Premium Quality</span></h1>
            <p class="text-slate-300 text-xs opacity-80">Your trust is our priority. Order now.</p>
        </div>
        
        <div class="max-w-sm mx-auto" data-aos="zoom-in">
            <div class="slider-container" id="sliderMain">
                <div id="sliderWrapper" class="slider-wrapper"></div>
            </div>
            <div id="sliderDots" class="dots-container"></div>
        </div>
    </header>

    <div class="grid grid-cols-3 gap-3 px-4 -mt-8 mb-10" data-aos="fade-up">
        <div class="badge-box">
            <i class="fa-solid fa-truck-fast"></i>
            <h4>Delivery</h4>
            <span>All Over Pakistan</span>
        </div>
        <div class="badge-box">
            <i class="fa-solid fa-shield"></i>
            <h4>100% Original</h4>
            <span>Premium Quality</span>
        </div>
        <div class="badge-box">
            <i class="fa-solid fa-headset"></i>
            <h4>24/7 Support</h4>
            <span>Help Center</span>
        </div>
    </div>

    <section id="products" class="py-8 px-4">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-slate-800">New Products</h2>
            <div class="h-1 w-10 bg-blue-600 mx-auto mt-2 rounded-full"></div>
        </div>
        
        <div id="product-grid" class="grid grid-cols-2 gap-4"></div>
    </section>

    <section id="contact" class="py-16 px-6 bg-slate-900 text-white rounded-t-[3rem]">
        <div class="container mx-auto text-center">
            <h2 class="text-2xl font-bold mb-8">Contact us</h2>
            <div class="bg-white/5 p-6 rounded-2xl border border-white/10 mb-10 text-left">
                <input type="text" id="userName" placeholder="Your Full Name" class="w-full bg-transparent border-b border-white/20 py-2 outline-none text-white text-sm mb-4">
                <textarea id="userMsg" placeholder="Type your order details here..." class="w-full bg-transparent border-b border-white/20 py-2 outline-none h-16 text-white text-sm mb-6"></textarea>
                <button onclick="sendOrder()" class="w-full bg-blue-600 py-4 rounded-xl font-bold text-xs uppercase tracking-widest active:scale-95 transition">Send to WhatsApp</button>
            </div>
            <div class="grid grid-cols-1 gap-8">
                <div>
                    <i class="fa-solid fa-location-dot text-blue-500 text-xl mb-2"></i>
                    <h4 class="text-xs font-bold text-blue-400 uppercase">Location</h4>
                    <p class="text-sm opacity-80">Punjab, Pakistan</p>
                </div>
                <div>
                    <i class="fa-brands fa-whatsapp text-green-500 text-xl mb-2"></i>
                    <h4 class="text-xs font-bold text-green-400 uppercase">WhatsApp</h4>
                    <p class="text-sm opacity-80">+92 370 4884772</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-8 text-center text-slate-500 text-[9px] bg-slate-900 tracking-widest uppercase border-t border-white/5">
        © 2026 WALEED STORE. OFFICIAL PREMIUM QUALITY.
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBYrmozXYLHxCmLsc8FX6aN6xSvORxXypo",
            authDomain: "waleed-store-f7369.firebaseapp.com",
            databaseURL: "https://waleed-store-f7369-default-rtdb.firebaseio.com/",
            projectId: "waleed-store-f7369",
            storageBucket: "waleed-store-f7369.firebasestorage.app",
            messagingSenderId: "766742927418",
            appId: "1:766742927418:web:310f0cb6afd311a4a93d03"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // IMPROVED SLIDER SCRIPT
        let currentSlide = 0;
        let imagesCount = 0;
        let sliderTimer;
        const wrapper = document.getElementById('sliderWrapper');
        const dotsContainer = document.getElementById('sliderDots');

        database.ref('slider').on('value', (snapshot) => {
            if(snapshot.exists()){
                wrapper.innerHTML = "";
                dotsContainer.innerHTML = "";
                let slidesHTML = "";
                let dotsHTML = "";
                let index = 0;
                
                snapshot.forEach(child => {
                    slidesHTML += `<img src="${child.val().url}" class="slider-img">`;
                    dotsHTML += `<div class="dot ${index === 0 ? 'active' : ''}" onclick="goToSlide(${index})"></div>`;
                    index++;
                });

                imagesCount = index;
                wrapper.innerHTML = slidesHTML;
                dotsContainer.innerHTML = dotsHTML;

                startAutoSlide();
                setupTouchSupport();
            }
        });

        function updateSlider() {
            wrapper.style.transform = `translateX(-${currentSlide * 100}%)`;
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === currentSlide);
            });
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % imagesCount;
            updateSlider();
        }

        function goToSlide(index) {
            currentSlide = index;
            updateSlider();
            resetTimer();
        }

        function startAutoSlide() {
            clearInterval(sliderTimer);
            sliderTimer = setInterval(nextSlide, 4000);
        }

        function resetTimer() {
            clearInterval(sliderTimer);
            startAutoSlide();
        }

        // TOUCH SUPPORT FOR SWIPING
        function setupTouchSupport() {
            let startX = 0;
            const container = document.getElementById('sliderMain');

            container.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                clearInterval(sliderTimer);
            });

            container.addEventListener('touchend', (e) => {
                let endX = e.changedTouches[0].clientX;
                let diff = startX - endX;

                if (Math.abs(diff) > 50) {
                    if (diff > 0) { // Swipe Left -> Next
                        currentSlide = (currentSlide + 1) % imagesCount;
                    } else { // Swipe Right -> Prev
                        currentSlide = (currentSlide - 1 + imagesCount) % imagesCount;
                    }
                    updateSlider();
                }
                startAutoSlide();
            });
        }

        function addToCart(id, name, price, img) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.push({ id, name, price, img });
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
        }

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            document.getElementById('cart-count').innerText = cart.length;
        }

        window.addEventListener('pageshow', updateCartCount);
        updateCartCount();

        database.ref('products').on('value', (snapshot) => {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            snapshot.forEach((child) => {
                const p = child.val();
                const id = child.key;
                const imagesArray = p.images || [p.image];
                const firstImage = imagesArray[0] || 'https://placehold.co/400x400';
                const displayOldPrice = p.originalPrice || p.price;

                grid.innerHTML += `
                    <div class="product-card p-2" data-aos="fade-up">
                        <div class="rounded-xl overflow-hidden aspect-square mb-2 relative bg-slate-50" onclick="window.location.href='product.html?id=${id}'">
                            <img src="${firstImage}" class="w-full h-full object-cover">
                        </div>
                        <div class="px-1 flex flex-col justify-between flex-grow">
                            <h3 class="font-bold text-[11px] text-slate-800 truncate">${p.name}</h3>
                            <div class="mt-1">
                                <span class="text-[10px] text-slate-400 line-through">Rs. ${displayOldPrice}</span>
                                <div class="text-sm font-extrabold text-blue-600">Rs. ${p.price}</div>
                            </div>
                            <button onclick="addToCart('${id}', '${p.name}', '${p.price}', '${firstImage}')" class="add-to-cart-btn active:scale-95 transition">Add To Cart</button>
                        </div>
                    </div>`;
            });
        });

        function sendOrder() {
            const name = document.getElementById('userName').value;
            const msg = document.getElementById('userMsg').value;
            if(!name || !msg) { alert("Please enter name and message"); return; }
            window.open(`https://wa.me/923704884772?text=Name: ${name}%0AMessage: ${msg}`, '_blank');
        }

        AOS.init({ duration: 1000, once: true });
    </script>
</body>
</html>
